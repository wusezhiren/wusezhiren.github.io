/* ===================== 输入 ===================== */
const keys = {}, lastTap = {}, _relTimer = {};
window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  // 取消待处理的"抬起"(Linux/X11 自动重复会发成 keyup→keydown 对, 否则会误判松键导致奔跑中断)
  if (_relTimer[k]) { clearTimeout(_relTimer[k]); _relTimer[k] = null; }
  if (!e.repeat && !keys[k]) {            // 仅真实按下计入双击, 忽略系统自动重复
    const now = performance.now();
    if (lastTap[k] && now - lastTap[k] < 250) keys['__dash_'+k] = true;
    lastTap[k] = now;
  }
  keys[k] = true;
});
// 抬起去抖: 延后清除, 若极短时间内又按下(自动重复)则取消清除, 保持"持续按住"
window.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if (_relTimer[k]) clearTimeout(_relTimer[k]);
  _relTimer[k] = setTimeout(() => { keys[k] = false; _relTimer[k] = null; }, 55);
});
const down = (...ks) => ks.some(k => keys[k]);
function pressed(k){ if(keys[k]){ keys[k]=false; return true; } return false; }

/* ===================== 技能栏拖拽换键 ===================== */
let skillDrag=null;
function skillBarGeom(){ const n=player?player.skills.length:7, sw=46, gap=8, total=n*sw+(n-1)*gap; return {n,sw,gap,total,sx0:(W-total)/2,sy:H-58}; }
function skillSlotAt(mx,my){ const g=skillBarGeom(); if(my<g.sy||my>g.sy+g.sw) return -1;
  for(let i=0;i<g.n;i++){ const x=g.sx0+i*(g.sw+g.gap); if(mx>=x&&mx<=x+g.sw) return i; } return -1; }
function canvasXY(e){ const r=canvas.getBoundingClientRect(); return {x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height)}; }
function rebindSkillKeys(){ player.skills.forEach((s,k)=>{ s.key = k===0 ? 'z' : SKILL_KEYS[k-1]; }); }
function swapSkillSlots(i,j){ const sk=player.skills; const t=sk[i]; sk[i]=sk[j]; sk[j]=t; rebindSkillKeys(); }
canvas.addEventListener('mousedown',e=>{ if(gameState!=='play'||!player) return;
  const m=canvasXY(e), i=skillSlotAt(m.x,m.y);
  if(i>0 && player.skills[i] && !player.skills[i].fixed){ skillDrag={from:i,x:m.x,y:m.y}; } });
canvas.addEventListener('mousemove',e=>{ if(skillDrag){ const m=canvasXY(e); skillDrag.x=m.x; skillDrag.y=m.y; } });
window.addEventListener('mouseup',e=>{ if(!skillDrag) return;
  const m=canvasXY(e), j=skillSlotAt(m.x,m.y);
  if(j>0 && j!==skillDrag.from && player.skills[j] && !player.skills[j].fixed){
    swapSkillSlots(skillDrag.from,j); if(typeof serializeRun==='function')serializeRun(); Audio2.sfx('ui'); }
  skillDrag=null; });
function drawSkillDrag(){ if(!skillDrag||!player) return; const g=skillBarGeom();
  const ti=skillSlotAt(skillDrag.x,skillDrag.y);
  if(ti>0){ const tx=g.sx0+ti*(g.sw+g.gap); ctx.strokeStyle='#ffd24d'; ctx.lineWidth=3; ctx.strokeRect(tx-2,g.sy-2,g.sw+4,g.sw+4); }
  const s=player.skills[skillDrag.from]; if(!s) return;
  ctx.save(); ctx.globalAlpha=0.9; ctx.fillStyle='#11151c'; ctx.fillRect(skillDrag.x-21,skillDrag.y-21,42,42);
  ctx.strokeStyle=s.color; ctx.lineWidth=2; ctx.strokeRect(skillDrag.x-21,skillDrag.y-21,42,42);
  ctx.globalAlpha=0.32; ctx.fillStyle=s.color; ctx.fillRect(skillDrag.x-18,skillDrag.y-18,36,36); ctx.globalAlpha=1;
  ctx.fillStyle='#fff'; ctx.font='bold 14px sans-serif'; ctx.textAlign='center'; ctx.fillText(s.key.toUpperCase(),skillDrag.x,skillDrag.y-2);
  ctx.font='9px sans-serif'; ctx.fillStyle='#cfd8e6'; ctx.fillText(s.name.slice(0,4),skillDrag.x,skillDrag.y+12); ctx.restore(); }

/* ===================== 工具 ===================== */
const rand = (a,b) => a + Math.random()*(b-a);
const clamp = (v,a,b) => v<a?a:v>b?b:v;
const lerp = (a,b,t) => a + (b-a)*t;
const aabb = (a,b) => Math.abs(a.x-b.x) < (a.w+b.w)/2 && Math.abs(a.y-b.y) < (a.depth+b.depth)/2;

/* ===================== 存档 ===================== */
const Save = {
  data:{ high:0, vol:0.5, muted:false, unlocked:MAX_UNLOCKED_DUNGEON },
  load(){ try{ const s=JSON.parse(localStorage.getItem('dnf_save')); if(s) Object.assign(this.data,s); }catch(e){} },
  save(){ try{ localStorage.setItem('dnf_save', JSON.stringify(this.data)); }catch(e){} }
};
Save.load();
Save.data.unlocked = Math.max(0, Math.min(MAX_UNLOCKED_DUNGEON, Save.data.unlocked ?? MAX_UNLOCKED_DUNGEON));

/* ===================== 音频(WebAudio 合成) ===================== */
const Audio2 = {
  ctx:null, master:null, bgmTimer:null, bgmStep:0, bossBgm:false,
  ensure(){
    if(this.ctx){ if(this.ctx.state==='suspended') this.ctx.resume(); return; }
    try{
      this.ctx = new (window.AudioContext||window.webkitAudioContext)();
      this.master = this.ctx.createGain();
      this.master.gain.value = Save.data.muted?0:Save.data.vol;
      this.master.connect(this.ctx.destination);
    }catch(e){}
  },
  setVol(v){ Save.data.vol=clamp(v,0,1); if(this.master&&!Save.data.muted) this.master.gain.value=Save.data.vol; Save.save(); },
  toggleMute(){ Save.data.muted=!Save.data.muted; if(this.master) this.master.gain.value=Save.data.muted?0:Save.data.vol; Save.save(); },
  beep(freq,dur,type='square',vol=0.3,slideTo){
    if(!this.ctx) return;
    const t=this.ctx.currentTime, o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo),t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t+dur+0.02);
  },
  noise(dur,vol=0.3,hp=false){
    if(!this.ctx) return;
    const len=Math.floor(this.ctx.sampleRate*dur), buf=this.ctx.createBuffer(1,len,this.ctx.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
    const s=this.ctx.createBufferSource(); s.buffer=buf;
    const g=this.ctx.createGain(); g.gain.value=vol;
    s.connect(g); g.connect(this.master); s.start();
  },
  sfx(name){
    if(!this.ctx) return;
    switch(name){
      case 'swing': this.noise(0.12,0.18); break;
      case 'hit':   this.beep(220,0.08,'square',0.25,90); this.noise(0.06,0.12); break;
      case 'crit':  this.beep(520,0.12,'square',0.3,160); this.noise(0.1,0.18); break;
      case 'skill': this.beep(330,0.18,'sawtooth',0.25,660); break;
      case 'ult':   this.beep(160,0.4,'sawtooth',0.3,880); this.noise(0.3,0.2); break;
      case 'hurt':  this.beep(180,0.18,'square',0.3,60); break;
      case 'die':   this.beep(300,0.5,'sawtooth',0.3,40); break;
      case 'levelup': [523,659,784,1046].forEach((f,i)=>setTimeout(()=>this.beep(f,0.18,'triangle',0.25),i*90)); break;
      case 'pickup': this.beep(880,0.08,'triangle',0.2,1200); break;
      case 'coin':  this.beep(1320,0.06,'square',0.15,1760); break;
      case 'select':this.beep(440,0.08,'square',0.2,660); break;
      case 'ui':    this.beep(660,0.05,'square',0.15); break;
      case 'explode':this.beep(120,0.35,'sawtooth',0.35,30); this.noise(0.35,0.3); break;
    }
  },
  startBgm(mode='normal'){
    clearInterval(this.bgmTimer); this.bgmStep=0;
    this.bossBgm=mode==='boss';
    const bass=this.bossBgm?[82,82,92,82,73,73,92,98]:[110,110,98,98,87,87,98,98];
    const lead=this.bossBgm?[330,392,330,294,262,294,392,440]:[440,523,659,523,440,392,523,587];
    this.bgmTimer=setInterval(()=>{
      if(!this.ctx) return;
      const i=this.bgmStep%8;
      this.beep(bass[i],this.bossBgm?0.3:0.22,this.bossBgm?'sawtooth':'triangle',this.bossBgm?0.13:0.10);
      if(this.bgmStep%2===0) this.beep(lead[i],this.bossBgm?0.25:0.18,'square',this.bossBgm?0.07:0.05);
      this.bgmStep++;
    },this.bossBgm?190:230);
  },
  startBossBgm(){ this.startBgm('boss'); },
  stopBgm(){ clearInterval(this.bgmTimer); this.bgmTimer=null; }
};

const RARITY_MUL  = {white:1, blue:1.8, purple:3.0, orange:5.0};
const EQUIP_SLOTS = ['weapon','head','chest','legs','shoes'];
const SLOT_LABEL  = {weapon:'武器', head:'头盔', chest:'上衣', legs:'腿甲', shoes:'鞋子'};

  weapon:{white:'铁剑',blue:'精铁剑',purple:'玄铁剑',orange:'天魔剑'},
  head:  {white:'皮帽',blue:'锁链盔',purple:'精钢盔',orange:'传说冠'},

  shoes: {white:'皮靴',blue:'锁链靴',purple:'精钢靴',orange:'传说靴'},
};
function genEquip(level){
  const v=Math.random();
  const rar=v<0.04?'orange':v<0.18?'purple':v<0.5?'blue':'white';
  const type=EQUIP_SLOTS[Math.floor(Math.random()*EQUIP_SLOTS.length)];
  const mul=RARITY_MUL[rar], base=Math.max(1,level)*0.028;
  const stats={};
  if(type==='weapon'){
    stats.atk=+((base*(0.8+Math.random()*0.4)*mul)).toFixed(3);
    if(Math.random()<0.45) stats.crit=+(rand(0.02,0.05)*mul).toFixed(3);
    if(Math.random()<0.35) stats.speed=+(rand(0.03,0.08)*mul).toFixed(3);
  } else {
    stats.hp=Math.round(16*(0.8+Math.random()*0.4)*mul*Math.max(1,level));
    if(Math.random()<0.35) stats.def=+(rand(0.03,0.07)*mul).toFixed(3);
    if(Math.random()<0.18) stats.speed=+(rand(0.01,0.035)*mul).toFixed(3);
  }
  if(Math.random()<0.25) stats.mp=Math.round(8*(0.8+Math.random()*0.4)*mul);
  return {id:Date.now()+Math.random(), name:ITEM_NAMES[type][rar], type, rarity:rar, stats, kind:'equip'};
}

function sellPrice(item){
  const base={white:44,blue:115,purple:290,orange:820};
  const sv=Object.values(item.stats).reduce((s,v)=>s+Math.abs(v)*140,0);
  return Math.round((base[item.rarity]+sv)*0.6);
}
function generateShopItems(){
  shopItems=[]; shopTab=0; shopCursor=0; shopSellMode=false;
  const lv=difficulty();
  const n=5+Math.floor(Math.random()*2);
  for(let i=0;i<n;i++){
    const eq=genEquip(lv);
    const rb={white:90,blue:250,purple:620,orange:1900};
    const sv=Object.values(eq.stats).reduce((s,v)=>s+Math.abs(v),0);
    eq.price=Math.round(rb[eq.rarity]*(1+sv*8)*(0.88+Math.random()*0.24));
    shopItems.push(eq);
  }
}

/* ===================== 实体基类 ===================== */
class Fighter {
  constructor(x,y,o){
    this.x=x; this.y=y; this.z=0; this.vz=0;
    this.w=o.w||44; this.depth=o.depth||28; this.h=o.h||92;
    this.dir=o.dir||1; this.hp=o.hp; this.maxhp=o.hp;
    this.speed=o.speed||3; this.color=o.color; this.dark=o.dark||'#333';
    this.dead=false; this.hurt=0; this.attackTimer=0; this.attackType=null;
    this.knock={x:0,y:0}; this.state='idle'; this.flash=0; this.walkPhase=0; this.slow=0;
  }
  get onGround(){ return this.z<=0.01; }
  applyKnock(){
    this.x+=this.knock.x; this.y+=this.knock.y;
    this.knock.x*=0.8; this.knock.y*=0.8;
    if(Math.abs(this.knock.x)<0.2)this.knock.x=0;
    if(Math.abs(this.knock.y)<0.2)this.knock.y=0;
    this.y=clamp(this.y,GROUND_TOP,GROUND_BOT);
  }
  physics(){ if(this.z>0||this.vz!==0){ this.z+=this.vz; this.vz-=GRAVITY; if(this.z<=0){this.z=0;this.vz=0;} } }
  screenY(){ return this.y - this.z; }
  takeDamage(dmg,fromDir,kb=8,crit=false){
    if(this.dead) return 0;
    this.hp-=dmg; this.hurt=12; this.flash=6; this.knock.x+=fromDir*kb;
    spawnHit(this.x,this.screenY()-this.h*0.5,'#ffd34d',crit?14:8);
    spawnText(this.x,this.screenY()-this.h-10,(crit?'暴击 ':'')+dmg,crit?'#ff5a5a':'#ffffff',crit);
    if(this.hp<=0){ this.hp=0; this.dead=true; }
    return dmg;
  }
}

/* ===================== 玩家投射物 ===================== */
class Projectile {
  constructor(x,y,z,dir,sk){
    this.x=x; this.y=y; this.z=z; this.dir=dir; this.sk=sk;
    this.vx=dir*(sk.speed||10); this.life=70; this.w=40; this.depth=sk.depth||24;
    this.pierce=sk.pierce||1; this.hit=new Set(); this.color=sk.color;
  }
  update(){
    this.x+=this.vx; this.life--;
    if(this.life%2===0) spawnHit(this.x,this.y-this.z-30,this.color,1);
    for(const e of enemies){
      if(e.dead||this.hit.has(e)) continue;
      if(Math.abs(this.x-e.x)<(this.w+e.w)/2 && Math.abs(this.y-e.y)<(this.depth+e.depth)/2 && Math.abs(this.z-e.z)<60){
        this.hit.add(e);
        const crit=Math.random()<player.crit;
        let dmg=Math.round(rand(this.sk.dmg[0],this.sk.dmg[1])*player.dmgMul()*(crit?1.8:1));
        e.takeDamage(dmg,this.dir,9,crit); comboHit(dmg,crit);
        if(this.sk.slow) e.slow=this.sk.slow;
        if(this.sk.launch){ e.vz=this.sk.launch; e.launched=true; }
        shake=Math.max(shake,4);
        if(this.hit.size>=this.pierce){ this.life=0; break; }
      }
    }
    if(this.x<-40||this.x>WORLD_W+40) this.life=0;
  }
  draw(){
    const y=this.y-this.z;
    const sk=this.sk;
    if(sk&&sk.fx&&SKILLFX.ready){ // 用客户端真实特效精灵作为飞行投射物外观(优先 <fx>_proj 飞行层, 循环播放)
      const clip=fxHasClip(sk.fx+'_proj')?sk.fx+'_proj':(fxHasClip(sk.fx)?sk.fx:null);
      if(clip){ drawFXClip(clip, performance.now(), this.x, y-28, SPR_SCALE*0.8, this.dir, 0.95); return; }
    }
    ctx.save(); ctx.globalAlpha=0.85;
    const grd=ctx.createRadialGradient(this.x,y-30,2,this.x,y-30,24);
    grd.addColorStop(0,'#fff'); grd.addColorStop(0.4,this.color); grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grd; ctx.beginPath(); ctx.ellipse(this.x,y-30,24,12,0,0,7); ctx.fill();
    ctx.restore();
  }
}

    }
    if(this.x<-40||this.x>WORLD_W+40||this.y<GROUND_TOP-40||this.y>GROUND_BOT+40) this.life=0;
  }
  draw(){

    ctx.save(); ctx.strokeStyle='#ffcf6a'; ctx.lineWidth=3; ctx.beginPath();

  }

class Pickup {
  constructor(x,y,kind,val,opts){
    this.x=x;this.y=y;this.z=14;this.vz=rand(3,6);this.kind=kind;this.val=val;this.life=600;this.w=24;this.depth=18;
    this.bossDrop=!!(opts&&opts.bossDrop);

  }

    this.life--;
    if(this.z>0||this.vz!==0){ this.z+=this.vz; this.vz-=0.5; if(this.z<=0){this.z=0;this.vz=0;} }
    const dx=player.x-this.x, dy=player.y-this.y, d=Math.hypot(dx,dy);
    if(d<95){ this.x+=dx/d*4; this.y+=dy/d*4; }
    if(d<26){
      if(this.kind==='gold'){
        player.gold+=this.val; score+=this.val; Audio2.sfx('coin'); spawnText(this.x,this.y-30,'+'+this.val+'金','#ffd24d');
      } else if(this.kind==='hp'){
        player.hp=clamp(player.hp+this.val,0,player.maxhp); Audio2.sfx('pickup'); spawnText(this.x,this.y-30,'+'+this.val+'HP','#7CFC00');
      } else if(this.kind==='mp'){
        player.mp=clamp(player.mp+this.val,0,player.maxmp); Audio2.sfx('pickup'); spawnText(this.x,this.y-30,'+'+this.val+'MP','#5cf');
      } else if(this.kind==='equip'){
        player.addItem(this.val); spawnText(this.x,this.y-36,this.val.name,RARITY_COL[this.val.rarity],true); spawnLootFly(this.x-camX,this.y-this.z,this.val); Audio2.sfx('levelup');
      } else if(this.kind==='consumable'){
        player.addItem({kind:'consumable',type:this.val}); spawnText(this.x,this.y-30,CONSUMABLE_DB[this.val].name,CONSUMABLE_DB[this.val].color);
      }
      this.life=0;
    }
  }
  draw(){
    const y=this.y-this.z;
    if(this.life<120 && Math.floor(this.life/6)%2===0) return;
    ctx.save();
    if(this.kind==='gold'){
      ctx.fillStyle='#ffd24d'; ctx.strokeStyle='#a8780f'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(this.x,y,8,0,7); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#a8780f'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center'; ctx.fillText('$',this.x,y+3);
    } else if(this.kind==='equip'){
      const col=RARITY_COL[this.val.rarity], p2=0.7+0.3*Math.sin(performance.now()/160);
      drawDropBeam(this.x,y,col,this.beamPower);
      ctx.globalAlpha=p2; ctx.fillStyle=col; ctx.beginPath(); ctx.arc(this.x,y-6,10,0,7); ctx.fill();
      ctx.globalAlpha=0.35*p2; ctx.fillStyle=col; ctx.beginPath(); ctx.arc(this.x,y-6,20,0,7); ctx.fill();
      ctx.globalAlpha=1; ctx.fillStyle='#fff'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center'; ctx.fillText('★',this.x,y-2);
    } else if(this.kind==='consumable'){
      const c=CONSUMABLE_DB[this.val];
      ctx.fillStyle=c.color; ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(this.x,y-6,9,0,7); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.font='12px sans-serif'; ctx.textAlign='center'; ctx.fillText(c.icon,this.x,y-2);
    } else {
      ctx.fillStyle=this.kind==='hp'?'#ff4d6a':'#4da6ff'; ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
      ctx.fillRect(this.x-6,y-9,12,16); ctx.strokeRect(this.x-6,y-9,12,16);
      ctx.fillStyle='#fff'; ctx.fillRect(this.x-3,y-12,6,4);
    }
    ctx.textAlign='left'; ctx.restore();
  }
}
function rarityBeam(rarity){ return RARITY_COL[rarity]||'#ffcf4d'; }
function drawDropBeam(x,y,col,power){
  const pulse=0.72+0.28*Math.sin(performance.now()/170), h=120*(power||1), w=18*(power||1)*pulse;
  const grd=ctx.createLinearGradient(x,y,x,y-h);
  grd.addColorStop(0,'rgba(255,255,255,.85)');
  grd.addColorStop(0.18,col);
  grd.addColorStop(1,'rgba(255,255,255,0)');
  ctx.save();
  ctx.globalAlpha=0.42*pulse; ctx.fillStyle=grd; ctx.fillRect(x-w/2,y-h,w,h);
  ctx.globalAlpha=0.18*pulse; ctx.fillStyle=col; ctx.beginPath(); ctx.ellipse(x,y-6,34*(power||1),10,0,0,7); ctx.fill();
  ctx.restore();
}

class Hazard {
  constructor(x,y,r,delay,dmg,color){ this.x=x;this.y=y;this.r=r;this.delay=delay;this.dmg=dmg;this.color=color;this.exploded=false;this.life=delay+18; }
  update(){
    this.delay--; this.life--;
    if(this.delay<=0 && !this.exploded){
      this.exploded=true;
      Audio2.sfx('explode'); shake=Math.max(shake,9);
      spawnHit(this.x,this.y-20,this.color,18);
      addEffect({type:'ring',x:this.x,y:this.y,color:this.color,max:20,r0:this.r*0.4,r1:this.r});
      if(!player.dead && player.invuln<=0){
        const dx=player.x-this.x, dy=(player.y-this.y);
        if(Math.hypot(dx,dy*1.6)<this.r){ player.takeDamage(this.dmg,Math.sign(dx)||1,10); player.invuln=20; }
      }
    }
  }
  draw(){
    if(this.exploded) return;
    const p=1-this.delay/(this.life-18+0.001);
    ctx.save(); ctx.globalAlpha=0.25+0.2*Math.sin(performance.now()/60);
    ctx.fillStyle=this.color; ctx.beginPath(); ctx.ellipse(this.x,this.y,this.r*p,this.r*0.5*p,0,0,7); ctx.fill();
    ctx.globalAlpha=0.8; ctx.strokeStyle=this.color; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(this.x,this.y,this.r,this.r*0.5,0,0,7); ctx.stroke();
    ctx.restore();
  }
}

class Player extends Fighter {
  constructor(clsKey){
    const c=CLASSES[clsKey];
    super(160,430,{w:46,depth:30,h:96,hp:c.hp,speed:c.speed,color:c.color,dark:c.dark,dir:1});
    this.cls=c; this.clsKey=clsKey;
    this.mp=c.mp; this.maxmp=c.mp;
    this.combo=0; this.comboTimer=0; this.dashTimer=0; this.invuln=0; this.running=0; this.castMove=null;
    // 槽位0=上挑(固定 Z), 其后6个职业技能映射到 Q W E A S D
    this.skills=[Object.assign({_cd:0},UPPERCUT)].concat(c.skills.map((s,i)=>Object.assign({_cd:0},s,{key:SKILL_KEYS[i]})));
    this.skillHits=[]; this.pendingProj=null; this.buff=null;
    this.level=DEFAULT_PLAYER_LEVEL; this.exp=0; this.expNext=80; this.gold=0;
    this._crit=0.16; this.shopAtk=0; this.buy={atk:0,hp:0,mp:0,crit:0};
    // 装备 & 背包
    this.inventory=[]; this.equipped={weapon:null,head:null,chest:null,legs:null,shoes:null};
    this.hotbar=new Array(6).fill(null); // {type,count,_cd} 或 null
    this.invOpen=false; this.invCursor=0;
  }
  get crit(){ return Math.min(0.7, this._crit + (this.equipped.weapon?.stats.crit||0) + (this.equipped.head?.stats.crit||0)); }
  equipStats(){
    return Object.values(this.equipped).reduce((s,e)=>{
      if(!e) return s;
      s.atk+=(e.stats.atk||0); s.hp+=(e.stats.hp||0);
      s.mp+=(e.stats.mp||0); s.def+=(e.stats.def||0); s.speed+=(e.stats.speed||0);
      return s;
    },{atk:0,hp:0,mp:0,def:0,speed:0});
  }
  speedStat(){ return clamp(this.equipStats().speed,0,0.55); }
  attackSpeedMul(){ return 1/(1+this.speedStat()); }
  dmgMul(){
    const es=this.equipStats();
    return this.cls.atkMul * (1+(this.level-1)*0.06+this.shopAtk+es.atk) * (this.buff?this.buff.atk:1);
  }
  takeDamage(dmg,fromDir,kb=8,crit=false){
    const def=clamp(this.equipStats().def,0,0.7);
    return super.takeDamage(Math.max(1,Math.round(dmg*(1-def))),fromDir,kb,crit);
  }
  equipItem(item){
    const old=this.equipped[item.type];
    if(old){ this.maxhp-=(old.stats.hp||0); this.maxmp-=(old.stats.mp||0); this.inventory.push(old); }
    this.equipped[item.type]=item;
    this.maxhp+=(item.stats.hp||0); this.maxmp+=(item.stats.mp||0);
    this.hp=clamp(this.hp,0,this.maxhp); this.mp=clamp(this.mp,0,this.maxmp);
    this.inventory.splice(this.inventory.indexOf(item),1);
    Audio2.sfx('ui'); spawnText(this.x,this.screenY()-this.h-24,'装备:'+item.name,RARITY_COL[item.rarity]);
  }
  addItem(item){
    if(item.kind==='consumable'){
      const slot=this.hotbar.findIndex(s=>s&&s.type===item.type);
      if(slot>=0){ this.hotbar[slot].count++; Audio2.sfx('pickup'); return; }
      const free=this.hotbar.findIndex(s=>!s);
      if(free>=0){ this.hotbar[free]={type:item.type,count:1,_cd:0,...CONSUMABLE_DB[item.type]}; Audio2.sfx('pickup'); return; }
    }
    if(this.inventory.length<INV_COLS*4) this.inventory.push(item);
  }
  useHotbar(slot){
    const h=this.hotbar[slot];
    if(!h||h.count<=0||h._cd>0) return;
    const c=CONSUMABLE_DB[h.type];
    if(c.hp) this.hp=clamp(this.hp+c.hp,0,this.maxhp);
    if(c.mp) this.mp=clamp(this.mp+c.mp,0,this.maxmp);
    if(c.buff) this.buff={...c.buff};
    h._cd=c.cd; h.count--;
    if(h.count<=0) this.hotbar[slot]=null;
    Audio2.sfx('pickup'); spawnText(this.x,this.screenY()-this.h-20,'使用'+c.name,c.color);
  }
  gainExp(n){
    this.exp+=n;
    while(this.exp>=this.expNext){
      this.exp-=this.expNext; this.level++; this.expNext=Math.round(this.expNext*1.35+30);
      this.maxhp+=26; this.maxmp+=12; this._crit=Math.min(0.5,this._crit+0.005);
      this.hp=this.maxhp; this.mp=this.maxmp;
      Audio2.sfx('levelup'); spawnText(this.x,this.screenY()-this.h-30,'升级! Lv.'+this.level,'#ffcf4d',true);
      addEffect({type:'aura',x:this.x,y:this.y,color:'#ffcf4d',max:36,r0:20,r1:110});
      shake=Math.max(shake,6);
    }
  }
  update(){
    if(this.dead) return;
    if(this.comboTimer>0)this.comboTimer--; else this.combo=0;
    if(this.invuln>0)this.invuln--;
    if(this.flash>0)this.flash--;
    if(this.hurt>0)this.hurt--;
    for(const s of this.skills) if(s._cd>0)s._cd--;
    let regen=0.09 + (this.buff&&this.buff.regen?this.buff.regen:0);
    this.mp=clamp(this.mp+regen,0,this.maxmp);
    if(this.buff){ this.buff.time--; if(this.buff.time<=0)this.buff=null; }
    for(const h of this.hotbar) if(h&&h._cd>0) h._cd--;
    const acting=this.attackTimer>0;

    if(this.dashTimer>0){ this.dashTimer--; this.x+=this.dir*9; spawnHit(this.x-this.dir*20,this.screenY()-30,this.cls.elem,1); }
    if(this.castMove){ this.castMove.ticks--; this.x+=this.castMove.vx; this.castMove.vx*=this.castMove.decay;
      if(this.castMove.ticks<=0||Math.abs(this.castMove.vx)<0.3) this.castMove=null; }

    // 双击方向 → 进入持续奔跑(松开该方向即停, 而非短冲刺)
    if(keys['__dash_arrowleft']){ this.running=-1; keys['__dash_arrowleft']=false; Audio2.sfx('swing'); }
    if(keys['__dash_arrowright']){ this.running=1;  keys['__dash_arrowright']=false; Audio2.sfx('swing'); }
    if(this.running===-1 && !down('arrowleft'))  this.running=0;
    if(this.running===1  && !down('arrowright')) this.running=0;

    if(!acting && this.dashTimer<=0){
      let mvx=0,mvy=0;
      if(down('arrowleft')){mvx=-1;this.dir=-1;}
      if(down('arrowright')){mvx=1;this.dir=1;}
      if(down('arrowup'))mvy=-1;
      if(down('arrowdown'))mvy=1;
      const runOn = this.running && ((this.running<0&&mvx<0)||(this.running>0&&mvx>0));
      const sp = runOn ? this.speed*1.15 : this.speed*0.30; // 奔跑放慢(1.5→1.15, 更贴合迈步节奏); 慢走速度更小以表现小步
      this.x+=mvx*sp;
      if(this.onGround)this.y+=mvy*sp*0.7;
      if(mvx||mvy)this.walkPhase+=runOn?0.45:0.16; else this.walkPhase=0; // 非奔跑时步态推进更慢（小步）
      this.state = runOn ? 'run' : ((mvx||mvy)?'walk':'idle');
      if(runOn && this.onGround && Math.random()<0.4) spawnHit(this.x-this.dir*16,this.screenY()-4,'#cfd8e6',1); // 奔跑扬尘
    }
    if(down('c')&&this.onGround&&!acting){ this.vz=13; Audio2.sfx('ui'); }
    this.physics();

    // 职业元素氛围: 平时微量飘逸, 奔跑/冲刺时更明显(在已有的每技能专属特效之外, 给角色本体加元素感)
    { const ec=this.cls.elem;
      const rate = this.dashTimer>0?0.9 : (this.state==='run'?0.4 : 0.10);
      if(Math.random()<rate) particles.push({x:this.x+rand(-14,14), y:this.screenY()-rand(8,70),
        vx:rand(-0.5,0.5)-this.dir*(this.dashTimer>0?1.4:0), vy:rand(-1.2,-0.2),
        life:rand(14,26), max:26, color:ec, r:rand(1.4,3)}); }

    // 连段取消: 普攻挥出后(后摇)可被下一段普攻或技能取消; 技能后摇末段亦可接技
    const _at=this.attackType;
    const canCancel = this.attackTimer>0 && !!_at && (
      (_at.basic && this.attackTimer<=9) ||                                       // 普攻后摇随时可取消接段
      (!_at.basic && this.attackTimer<=Math.max(4,Math.round((_at.dur||16)*0.34))) // 技能后摇末段可接技
    );
    // 普攻(支持空中、可快速连段、可取消技能后摇接普攻)
    if(pressed('x') && (this.attackTimer<=0 || canCancel)){
      if(canCancel && _at && !_at.basic) spawnHit(this.x+this.dir*22,this.screenY()-46,this.cls.elem,3); // 取消接普攻的元素火花
      this.combo=(this.combo%3)+1; this.comboTimer=40;
      this.attackTimer=Math.max(9,Math.round(16*this.attackSpeedMul())); this.attackType={name:'普攻',basic:true,combo:this.combo,dur:16};
      this.basicHit=new Set(); Audio2.sfx('swing');
    }
    // 技能释放(普攻/技能后摇可取消接技 -> 搓招连段)
    if((this.attackTimer<=0 || canCancel) && this.dashTimer<=0){
      for(const s of this.skills){
        if(keys[s.key]){
          keys[s.key]=false;
          if(s.ul>this.level){ spawnText(this.x,this.screenY()-this.h-26,'Lv.'+s.ul+'解锁','#888'); }
          else if(s._cd>0){ }
          else if(this.mp<s.mp){ spawnText(this.x,this.screenY()-this.h-26,'蓝量不足','#6cf'); }
          else this.cast(s);
        }
      }
    }

    // 普攻判定
    if(this.attackType&&this.attackType.basic&&this.attackTimer<12&&this.attackTimer>3){
      const reach=70, box={x:this.x+this.dir*(this.w/2+reach/2),y:this.y,w:reach,depth:this.depth+14};
      for(const e of enemies){
        if(e.dead||this.basicHit.has(e))continue;
        if(aabb(box,e)&&Math.abs(this.z-e.z)<70){
          this.basicHit.add(e);
          const crit=Math.random()<this.crit;
          let dmg=Math.round(rand(11,16)*this.dmgMul()*(crit?1.8:1));
          e.takeDamage(dmg,this.dir,10,crit); comboHit(dmg,crit);
          this.mp=clamp(this.mp+3,0,this.maxmp); shake=Math.max(shake,4);
          spawnHit(e.x,e.screenY()-e.h*0.5,this.cls.elem,crit?4:2);                       // 元素命中火花
          if(this.combo===3 && e.kind!=='boss' && e.onGround && !e.launched){             // 第三段把地面小怪挑起 → 浮空连段(玩家保持站立, 不再自动起跳)
            e.vz=Math.max(e.vz,7.5); e.launched=true; e.juggle=50; spawnHit(e.x,e.screenY()-e.h*0.6,'#fff',5); }
        }
      }
    }
    if(this.attackTimer>0)this.attackTimer--;

    for(let i=this.skillHits.length-1;i>=0;i--){ const hit=this.skillHits[i]; if(--hit.delay<=0){ this.resolveHit(hit); this.skillHits.splice(i,1); } }
    if(this.pendingProj){ if(--this.pendingProj.delay<=0){ const sk=this.pendingProj.sk; projectiles.push(new Projectile(this.x+this.dir*40,this.y,this.z+50,this.dir,sk)); this.pendingProj=null; } }

    this.applyKnock();
    this.x=clamp(this.x,30,WORLD_W-30); this.y=clamp(this.y,GROUND_TOP,GROUND_BOT);
    for(const kk in keys) if(kk.startsWith('__dash_')&&!down(kk.replace('__dash_','')))keys[kk]=false;
  }
  cast(sk){
    this.mp-=sk.mp; sk._cd=sk.cd; const actionDur=skillActionDurationTicks(sk.fx,sk.dur);
    this.attackTimer=Math.max(8,Math.round(actionDur*this.attackSpeedMul())); sk._castDur=this.attackTimer; this.attackType=sk;
    spawnText(this.x,this.screenY()-this.h-30,sk.name+'!',sk.color);
    Audio2.sfx(sk.type==='ult'?'ult':'skill');
    spawnSkillFX(this, sk);                         // 每个技能的专属大型特效
    const mv=SKILL_MOVE[sk.fx];                      // 技能位移: 角色跟随前冲/上升
    if(mv){ const ticks=mv.t==='dur'?this.attackTimer:mv.t;
      this.castMove={vx:this.dir*(mv.vx||0), ticks, decay:0.9};
      if(mv.rise&&this.onGround) this.vz=mv.rise; }
    if(sk.type==='buff'){ this.buff={atk:sk.buff.atk,time:sk.buff.time,regen:sk.buff.regen||0}; return; }
    if(sk.type==='proj'){ this.pendingProj={sk,delay:8}; return; }
    if(sk.type==='dash'){ this.dashTimer=sk.dash; this.invuln=Math.max(sk.dur,18);
      for(let i=0;i<5;i++) this.skillHits.push({delay:i*3+2,sk,reach:sk.reach||84,radius:0,ox:30}); return; }
    const segs=sk.hits||1;
    for(let i=0;i<segs;i++) this.skillHits.push({delay:6+i*4,sk,reach:sk.reach,radius:sk.radius,ox:sk.ox||0});
    if(sk.fire){ const fx2=this.x+this.dir*(sk.ox||0);
      for(let i=0;i<16;i++) particles.push({x:fx2+rand(-50,50),y:this.y-rand(0,70),vx:rand(-2,2),vy:rand(-5,-1),life:rand(18,36),max:36,color:i%2?'#ff9a3c':'#ffcf4d',r:rand(3,7)}); }
  }
  resolveHit(hit){
    const sk=hit.sk; let box;
    if(hit.radius){ const cx=this.x+this.dir*(hit.ox||0); box={x:cx,y:this.y,w:hit.radius*2,depth:hit.radius}; }
    else { const reach=hit.reach||80; box={x:this.x+this.dir*(this.w/2+reach/2+(hit.ox||0)*0.4),y:this.y,w:reach,depth:this.depth+18}; }
    let healed=0; const ls=(sk.lifesteal||this.cls.lifesteal||0);
    for(const e of enemies){
      if(e.dead)continue;
      if(aabb(box,e)&&Math.abs(this.z-e.z)<72){
        const crit=Math.random()<this.crit;
        let dmg=Math.round(rand(sk.dmg[0],sk.dmg[1])*this.dmgMul()*(crit?1.8:1));
        const real=e.takeDamage(dmg,this.dir,sk.knock||12,crit); comboHit(dmg,crit);
        if(sk.launch){ e.vz=Math.max(e.vz,sk.launch); e.launched=true; }
        if(sk.slow) e.slow=sk.slow;
        if(ls) healed+=real*ls;
        spawnHit(e.x,e.screenY()-40,sk.color,8); shake=Math.max(shake,sk.type==='ult'?10:6);
      }
    }
    if(healed>0){ this.hp=clamp(this.hp+Math.round(healed),0,this.maxhp); spawnText(this.x,this.screenY()-this.h,'+'+Math.round(healed),'#7CFC00'); }
  }
  draw(){ drawPlayerFigure(this); }
}

const DUNGEONS = [
  {id:'lorien', name:'洛兰幽暗密林', recommendedLv:1, rooms:5,
    tint:['#241c2e','#3a2c40'], floor:['#4a3f33','#2b2520'],
    monsterPool:['gob','gob','gob','orc'], boss:'boss',
    desc:'新手森林,哥布林成群出没,适合熟悉走门刷图节奏。'},
  {id:'grakqarak', name:'格兰之森·雷鸣废墟', recommendedLv:3, rooms:6,
    tint:['#1c2630','#26404a'], floor:['#3e4850','#20282d'],
    monsterPool:['gob','orc','orc','archer','archer'], boss:'boss',
    desc:'阴冷废墟,弓箭手拉开距离,需要用突进打断。'},
  {id:'flamepass', name:'烈焰格拉卡', recommendedLv:5, rooms:6,
    tint:['#2e1c22','#43282c'], floor:['#4b3026','#251713'],
    monsterPool:['orc','charger','charger','bomber','gob'], boss:'boss',
    desc:'灼热通道,冲锋怪和自爆怪压迫走位。'},
  {id:'shadowkeep', name:'暗黑雷鸣废墟', recommendedLv:8, rooms:7,
    tint:['#1c2e22','#284338'], floor:['#334235','#171f18'],
    monsterPool:['orc','archer','charger','bomber','bomber','gob'], boss:'boss',
    desc:'高阶混编地下城,远程、冲锋、自爆同时登场。'},
];
function currentDungeonDef(){ return DUNGEONS[dungeonId] || DUNGEONS[0]; }
function currentRooms(){ return currentDungeonDef().rooms || ROOMS_PER_DUNGEON; }
function pickMonsterKind(dun){ const pool=dun.monsterPool||['gob']; return pool[Math.floor(Math.random()*pool.length)]||'gob'; }
function unlockNextDungeon(id){
  const next=clamp(id+1,0,DUNGEONS.length-1);
  if((Save.data.unlocked||0)<next){ Save.data.unlocked=next; Save.save(); return true; }
  Save.save(); return false;
}

const ENEMY_CONF = {
  gob:    {w:40,depth:26,h:84, hp:75, speed:2.4,color:'#9a7b4f',dark:'#5f4a2c',exp:14,gold:[1,3]},
  orc:    {w:50,depth:32,h:104,hp:150,speed:1.9,color:'#5a8f4a',dark:'#33602a',exp:26,gold:[3,6]},
  archer: {w:42,depth:26,h:88, hp:90, speed:1.7,color:'#6a5f9a',dark:'#352b5e',exp:22,gold:[3,6]},
  charger:{w:54,depth:32,h:102,hp:170,speed:2.0,color:'#a05a2a',dark:'#5e3216',exp:30,gold:[4,8]},
  bomber: {w:42,depth:26,h:80, hp:55, speed:2.7,color:'#9a9a3a',dark:'#5e5e1e',exp:18,gold:[2,5]},
  boss:   {w:62,depth:38,h:130,hp:560,speed:1.6,color:'#b23a3a',dark:'#6e1f1f',exp:140,gold:[30,55]},
};
class Enemy extends Fighter {
  constructor(x,y,kind='gob',scale=1){
    const c=ENEMY_CONF[kind];
    super(x,y,{w:c.w,depth:c.depth,h:c.h,hp:Math.round(c.hp*scale),speed:c.speed,color:c.color,dark:c.dark,dir:-1});
    this.kind=kind; this.conf=c; this.scale=scale;
    this.attackCd=rand(20,80); this.knockdown=0; this.getupProtect=0; this.launched=false; this.airCombo=0; this.juggle=0;
    this.bossCd=180; this.enraged=false; this.fuse=0; this.chargeState=0; this.chargeCd=rand(40,120);
    this.atkScale=scale;
    this.aggro=(kind==='boss'); // 仇恨: 玩家进入范围或被攻击后激活, Boss 进房即仇恨
    this.aggroRange=(kind==='archer'||kind==='charger')?340:230;
  }
  hurtPlayer(dmg,kb){ if(player.dead||player.invuln>0)return false;
    player.takeDamage(dmg,this.dir,kb); player.invuln=18; shake=Math.max(shake,5); Audio2.sfx('hurt'); return true; }
  takeDamage(dmg,fromDir,kb,crit){
    if(this.getupProtect>0 && this.onGround) return 0; // 起身保护: 倒地刚起身不再被无限压起身
    if(!this.onGround||this.launched){ this.airCombo++; this.juggle=50; dmg=Math.round(dmg*1.12); this.vz=Math.max(this.vz,3.2); }
    const r=super.takeDamage(dmg,fromDir,kb,crit);
    if(!this.dead&&!this.aggro) alertChain(this);
    return r;
  }
  update(){
    if(this.dead)return;
    if(this.flash>0)this.flash--;
    if(this.slow>0)this.slow--;
    if(this.getupProtect>0)this.getupProtect--;
    if(this.juggle>0)this.juggle--;
    if(this.knockdown>0){
      this.knockdown--; this.applyKnock(); this.physics();
      if(this.knockdown<=0){ this.getupProtect=34; this.airCombo=0; spawnText(this.x,this.screenY()-this.h-8,'起身保护','#8ab4ff'); addEffect({type:'aura',x:this.x,y:this.y,color:'#8ab4ff',max:24,r0:10,r1:62}); }
      return;
    }
    if(this.launched && this.onGround && this.vz<=0){ this.launched=false; this.juggle=0; this.knockdown=24+Math.min(28,this.airCombo*4); spawnHit(this.x,this.y,'#fff',6); }
    if(this.hurt>0 && this.z<=0){ this.hurt--; this.applyKnock(); this.physics(); return; }
    if(this.hurt>0)this.hurt--;
    if(this.attackCd>0)this.attackCd--;
    this.physics();
    const spd=this.speed*(this.slow>0?0.45:1);
    const dx=player.x-this.x, dy=player.y-this.y, dist=Math.hypot(dx,dy);
    this.dir=dx<0?-1:1;
    if(!this.aggro){
      if(dist<this.aggroRange){ alertChain(this); }   // 玩家进入范围 → 连锁唤醒
      else { this.walkPhase=0; this.state='idle'; this.applyKnock();
        this.x=clamp(this.x,20,WORLD_W-20); this.y=clamp(this.y,GROUND_TOP,GROUND_BOT); return; } // 待机, 不追不打
    }
    if(this.kind==='archer'){ this.aiArcher(dx,dy,dist,spd); }
    else if(this.kind==='charger'){ this.aiCharger(dx,dy,dist,spd); }
    else if(this.kind==='bomber'){ this.aiBomber(dx,dy,dist,spd); }
    else { this.aiMelee(dx,dy,dist,spd); }
    this.applyKnock();
    this.x=clamp(this.x,20,WORLD_W-20); this.y=clamp(this.y,GROUND_TOP,GROUND_BOT);
  }
  aiMelee(dx,dy,dist,spd){
    const reach=this.kind==='boss'?92:60;
    if(this.kind==='boss'){
      if(!this.enraged && this.hp<this.maxhp*0.3){ this.enraged=true; this.speed*=1.4; spawnText(this.x,this.screenY()-this.h-20,'狂暴!','#ff2a2a',true); }
      if(this.bossCd>0)this.bossCd--; else if(this.attackTimer<=0){ this.bossSpecial(); this.bossCd=this.enraged?120:200; return; }
    }
    if(this.attackTimer>0){
      this.attackTimer--;
      if(this.attackTimer<10&&this.attackTimer>4&&!this._hitDone){
        const box={x:this.x+this.dir*(this.w/2+reach/2),y:this.y,w:reach,depth:this.depth+16};
        if(aabb(box,player)&&Math.abs(this.z-player.z)<60){ this._hitDone=true;
          this.hurtPlayer(Math.round((this.kind==='boss'?rand(20,30):this.kind==='orc'?rand(10,16):rand(6,10))*this.atkScale),this.kind==='boss'?14:7); } }
    } else {
      if(dist>reach-6||Math.abs(dy)>20){ const nx=dx/(dist||1),ny=dy/(dist||1); this.x+=nx*spd; this.y+=ny*spd*0.7; this.walkPhase+=0.2; }
      else if(this.attackCd<=0){ this.attackTimer=this.kind==='boss'?28:22; this.attackCd=this.kind==='boss'?50:rand(60,110); this._hitDone=false; }
    }
  }
  bossSpecial(){
    const r=Math.random();
    if(r<0.5){ // 范围预警
      for(let i=0;i<2;i++) hazards.push(new Hazard(clamp(player.x+rand(-60,60),40,WORLD_W-40),clamp(player.y+rand(-30,30),GROUND_TOP,GROUND_BOT),80,50,Math.round(28*this.atkScale),'#ff5a3c'));
      spawnText(this.x,this.screenY()-this.h-16,'地裂!','#ff5a3c');
    } else { // 召唤
      for(let i=0;i<2;i++) enemies.push(new Enemy(clamp(this.x+rand(-80,80),40,WORLD_W-40),clamp(this.y+rand(-20,20),GROUND_TOP,GROUND_BOT),'gob',this.scale*0.8));
      spawnText(this.x,this.screenY()-this.h-16,'召唤!','#b98cff');
    }
  }
  aiArcher(dx,dy,dist,spd){
    const want=210;
    if(this.attackTimer>0){ this.attackTimer--;
      if(this.attackTimer===8){ const sp=Math.hypot(dx,dy)||1; enemyProjectiles.push(new EnemyProjectile(this.x+this.dir*20,this.y,this.z+44,dx/sp*7,dy/sp*7,Math.round(rand(8,13)*this.atkScale))); } }
    else {
      if(dist<want-30){ this.x-=dx/(dist||1)*spd; this.y-=dy/(dist||1)*spd*0.6; this.walkPhase+=0.2; }
      else if(Math.abs(dy)>30){ this.y+=Math.sign(dy)*spd*0.6; this.walkPhase+=0.2; }
      else if(this.attackCd<=0){ this.attackTimer=22; this.attackCd=rand(70,130); }
    }
  }
  aiCharger(dx,dy,dist,spd){
    if(this.chargeState===0){
      if(dist<260 && Math.abs(dy)<40 && this.chargeCd<=0){ this.chargeState=1; this.windup=30; spawnText(this.x,this.screenY()-this.h-14,'蓄力...','#ffb35a'); }
      else { if(Math.abs(dy)>20){ this.y+=Math.sign(dy)*spd; } this.x+=Math.sign(dx)*spd*0.6; this.walkPhase+=0.2; if(this.chargeCd>0)this.chargeCd--; }

// 从 origin 起 BFS 扩散: 被唤醒的怪再唤醒附近的怪(链式仇恨)
const AGGRO_CHAIN=300;
function alertChain(origin){
  if(origin.aggro) return;
  const q=[origin]; origin.aggro=true; spawnText(origin.x,origin.screenY()-origin.h-10,'!','#ff5a5a');
  while(q.length){
    const a=q.shift();
    for(const e of enemies){
      if(e.dead||e.aggro) continue;
      if(Math.hypot(e.x-a.x,e.y-a.y)<AGGRO_CHAIN){ e.aggro=true; spawnText(e.x,e.screenY()-e.h-10,'!','#ff5a5a'); q.push(e); }
    }
  }
}

function pickSwordActionFrame(at, prog){

// v3 元数据: {clips:{name:{dur,layers:[{loop,frames:[[sx,sy,sw,sh,ox,oy,delay,rx,ry,a]|[delay]...]}]}}}
// 实帧偏移 ox/oy = 原版 .ani 逐帧坐标 + .img 帧偏移(角色脚底为原点), rx/ry=缩放%, a=透明度0..255
function fxClip(clip){ return SKILLFX.meta && SKILLFX.meta.clips && SKILLFX.meta.clips[clip]; }
function fxHasClip(clip){ const c=fxClip(clip); return !!(c&&c.layers&&c.layers.length); }
function fxClipInfo(clip){ // 缓存: 时长 + 各层总时长 + 非空帧包围盒中心(供投射物/挂饰居中)
  if(SKILLFX._ref[clip]) return SKILLFX._ref[clip];
  const c=fxClip(clip); let r={dur:500,totals:[],cx:0,cy:0};
  if(c&&c.layers){ let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
    r.dur=c.dur||500;
    for(const l of c.layers){ let t=0;
      for(const f of l.frames){ if(f.length===1){ t+=f[0]; continue; } t+=f[6];
        if(f[4]<minx)minx=f[4]; if(f[5]<miny)miny=f[5];
        if(f[4]+f[2]>maxx)maxx=f[4]+f[2]; if(f[5]+f[3]>maxy)maxy=f[5]+f[3]; }
      r.totals.push(t); }
    if(minx<1e9){ r.cx=(minx+maxx)/2; r.cy=(miny+maxy)/2; }
  }

}
// 按原版时间轴绘制: tMs=特效经过毫秒, 原点(ox,oy)=施法者脚底; dir 水平翻转; 加色混合
// loopAll: 全部图层循环(投射物飞行/常驻挂饰); dx/dy: 额外平移(包围盒居中用)
function drawFXClipLayers(clip, tMs, ox, oy, scale, dir, alpha, loopAll, dx, dy){
  if(!SKILLFX.ready) return false;
  const c=fxClip(clip); if(!c||!c.layers||!c.layers.length) return false;
  const info=fxClipInfo(clip);
  ctx.save();
  ctx.globalCompositeOperation='lighter';   // 原版特效全部黑底发光(GRAPHIC EFFECT=加色)
  ctx.translate(ox,oy); ctx.scale(dir*scale, scale);
  for(let li=0;li<c.layers.length;li++){
    const l=c.layers[li], total=info.totals[li]; if(!total) continue;
    let t=tMs;
    if(l.loop||loopAll) t=tMs%total;
    else if(t>=total) continue;              // 一次性图层播完即隐(还原各层错峰出现/消失)
    let f=null, acc=0;
    for(const fr of l.frames){ const d=fr.length===1?fr[0]:fr[6]; if(t<acc+d){ f=fr; break; } acc+=d; }
    if(!f||f.length===1) continue;           // 空帧(原版用它做图层延时出场)
    const kx=(f[7]==null?100:f[7])/100, ky=(f[8]==null?100:f[8])/100;
    ctx.globalAlpha=alpha*((f[9]==null?255:f[9])/255);
    const fx=f[4]+(dx||0), fy=f[5]+(dy||0);
    if(kx<0||ky<0){ ctx.save(); ctx.translate(fx,fy); ctx.scale(kx<0?-1:1,ky<0?-1:1);
      ctx.drawImage(SKILLFX.img, f[0],f[1],f[2],f[3], 0,0, f[2]*Math.abs(kx), f[3]*Math.abs(ky)); ctx.restore(); }
    else ctx.drawImage(SKILLFX.img, f[0],f[1],f[2],f[3], fx, fy, f[2]*kx, f[3]*ky);
  }
  ctx.restore(); return true;
}
// 居中循环绘制(投射物飞行外观/波动刻印等挂饰): 包围盒中心落在 (x,y), 全层循环
function drawFXClip(clip, tMs, x, y, scale, dir, alpha){
  if(!fxHasClip(clip)) return false;

}
// 职业进图常驻 buff 标识(世界坐标, 不随角色翻转)

  charger:{file:'mon_charger',scale:0.88, face:1,  idle:[0,1,2,3,4,5],   walk:[25,26,27,28,29,30,31],   attack:[8,9,10,11,12,13],die:[23,24]},

};
const MON_SPR={};
for(const k in MON_DEF){ const d=MON_DEF[k], o={img:new Image(),meta:null,ready:false,def:d};
  o.img.onload=()=>{ if(o.meta)o.ready=true; };
  o.img.src='assets/'+d.file+'.png';
  if(window['MON_META_'+k]){ o.meta=window['MON_META_'+k]; if(o.img.complete&&o.img.naturalWidth)o.ready=true; }
  else fetch('assets/'+d.file+'.json').then(r=>r.json()).then(m=>{o.meta=m; if(o.img.complete&&o.img.naturalWidth)o.ready=true;}).catch(()=>{});
  MON_SPR[k]=o;
}
function pickMonFrame(e,d){
  let a,idx;
  if(e.dead){ a=d.die; idx=Math.min(a.length-1,Math.floor((e._t||0)/3)); }
  else if(e.knockdown>0){ a=d.die; idx=0; }
  else if(e.attackTimer>0){ a=d.attack; const dur=(e.kind==='boss'?28:22);
    idx=Math.min(a.length-1,Math.floor(clamp(1-e.attackTimer/dur,0,1)*a.length)); }
  else if(e.aggro){ a=d.walk; idx=Math.floor(performance.now()/110)%a.length; }
  else { a=d.idle; idx=Math.floor(performance.now()/200)%a.length; }
  return a[idx];
}
function drawMonsterSprite(e){
  const o=MON_SPR[e.kind]; if(!o||!o.ready||!o.meta) return false;
  const fi=pickMonFrame(e,o.def), F=o.meta.frames[fi]; if(!F) return false;
  const sx=F[0],sy=F[1],sw=F[2],sh=F[3],ox=F[4],oy=F[5];
  const s=o.def.scale*(e.scale?Math.min(1.5,0.85+0.15*e.scale):1), feetY=e.screenY(), flip=(e.dir!==o.def.face);
  ctx.save(); ctx.translate(e.x,feetY);
  if(e.elite&&!e.dead){ ctx.save(); ctx.globalAlpha=0.35+0.2*Math.sin(performance.now()/140);
    ctx.fillStyle=e.eliteCol||'#ffcf4d'; ctx.beginPath(); ctx.ellipse(0,-6,40,15,0,0,7); ctx.fill(); ctx.restore(); }
  ctx.scale(flip?-1:1,1);
  if(e.dead) ctx.globalAlpha=clamp(1-(e._t||0)/30,0,1);
  ctx.drawImage(o.img,sx,sy,sw,sh,ox*s,oy*s,sw*s,sh*s);
  if((e.flash>0&&e.flash%2===0)||e.elite){ ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha=e.flash>0&&e.flash%2===0?0.55:(0.12+0.08*Math.sin(performance.now()/200));
    ctx.drawImage(o.img,sx,sy,sw,sh,ox*s,oy*s,sw*s,sh*s); }
  ctx.restore();
  if(e.elite&&!e.dead){ ctx.fillStyle=e.eliteCol||'#ffcf4d'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
    ctx.fillText('★ 精英',e.x,feetY+oy*s-8); ctx.textAlign='left'; }
  return true;
}

/* ===================== 玩家角色绘制 ===================== */
function drawPlayerFigure(p){
  const feetY=p.screenY(), dir=p.dir;
  // 精灵渲染(鬼剑士真实素材); 加载失败则回退到下方矢量小人
  if(SPR.ready){
    drawShadow(p.x,p.y,p.w+8);
    if(p.buff){ ctx.save(); ctx.globalAlpha=0.3+0.12*Math.sin(performance.now()/100);
      ctx.fillStyle=p.buff.atk>=1.5?'#ff3b3b':'#ffd24d';
      ctx.beginPath(); ctx.ellipse(p.x,p.y,p.w*0.9,18,0,0,7); ctx.fill(); ctx.restore(); }
    if(drawSwordmanSprite(p)) return;
  }
  drawShadow(p.x,p.y,p.w+8);
  if(p.buff){
    ctx.save(); ctx.globalAlpha=0.3+0.12*Math.sin(performance.now()/100);
    ctx.fillStyle=p.buff.atk>=1.5?'#ff3b3b':'#ffd24d';
    ctx.beginPath(); ctx.ellipse(p.x,p.y,p.w*0.9,18,0,0,7); ctx.fill(); ctx.restore();
  }
  ctx.save(); ctx.translate(p.x,feetY); ctx.scale(dir,1);
  if(p.invuln>0) ctx.globalAlpha=0.65;
  const flash=p.flash>0&&p.flash%2===0;
  const atk=(p.attackTimer||0)>0, sk=p.attackType;
  const prog=atk?clamp(1-p.attackTimer/(sk&&sk.dur||16),0,1):0;
  const walk=Math.sin(p.walkPhase||0)*(p.state==='walk'?7:0);
  const breath=(p.onGround&&!atk&&p.state!=='walk')?Math.sin(performance.now()/600)*1.5:0; // 待机呼吸
  const bob=(p.onGround?0:-4)+breath;
  const pose=atk?getSkillPose(p.clsKey,sk,prog,28,52):{
    rax:14+walk*0.3, ray:-(28+52*0.28)+walk*0.5+breath, lax:-12-walk*0.3, lay:-(28+52*0.28)-walk*0.5+breath
  };
  if(pose.lunge) ctx.translate(pose.lunge,0);   // 突刺前冲
  // DNF 式武器挥砍拖尾光带(刀尖最近数帧轨迹)
  if(atk && pose.wAng!=null){
    const len=58, tipX=pose.rax+Math.cos(pose.wAng)*len, tipY=pose.ray+Math.sin(pose.wAng)*len;
    (p._wTrail||(p._wTrail=[])).push({rx:pose.rax,ry:pose.ray,tx:tipX,ty:tipY});
    if(p._wTrail.length>7) p._wTrail.shift();
    const tr=p._wTrail;
    for(let i=1;i<tr.length;i++){ const a=i/tr.length;
      ctx.globalAlpha=a*0.45; ctx.fillStyle=p.cls.elem;
      ctx.beginPath(); ctx.moveTo(tr[i-1].rx,tr[i-1].ry); ctx.lineTo(tr[i-1].tx,tr[i-1].ty);
      ctx.lineTo(tr[i].tx,tr[i].ty); ctx.lineTo(tr[i].rx,tr[i].ry); ctx.closePath(); ctx.fill(); }
    ctx.globalAlpha=p.invuln>0?0.65:1;
  } else if(p._wTrail) p._wTrail.length=0;
  switch(p.clsKey){
    case 'blade':   _drawBlade(flash,atk,sk,walk,bob,pose);   break;
    case 'berserk': _drawBerserk(flash,atk,sk,walk,bob,pose); break;
    case 'spectre': _drawSpectre(flash,atk,sk,walk,bob,pose); break;
    case 'asura':   _drawAsura(flash,atk,sk,walk,bob,pose);   break;
    default:        _drawBlade(flash,atk,sk,walk,bob,pose);
  }
  ctx.restore();
  if(atk&&sk&&sk.basic){
    const c=sk.combo||1, el=p.cls.elem, cy=feetY-p.h*0.55;
    ctx.save(); ctx.globalAlpha=0.82*(1-prog); ctx.strokeStyle=el; ctx.lineWidth=8*(1-prog)+2; ctx.lineCap='round';
    if(c===3){ // 突刺: 向前的尖光带
      const len=58+prog*60, ox=p.x+dir*26;
      ctx.beginPath(); ctx.moveTo(ox,cy); ctx.lineTo(ox+dir*len,cy); ctx.stroke();
      ctx.globalAlpha=0.55*(1-prog); ctx.strokeStyle='#fff'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(ox,cy); ctx.lineTo(ox+dir*len*0.82,cy); ctx.stroke();
    } else if(c===2){ // 反手由下往上回斩
      const sA=dir>0?1.05:Math.PI-1.05, eA=sA-dir*2.25*prog;
      ctx.beginPath(); ctx.arc(p.x,cy,68,sA,eA,dir>0); ctx.stroke();
    } else { // 斜劈由上往下
      const sA=dir>0?-1.75:Math.PI+1.75, eA=sA+dir*2.25*prog;
      ctx.beginPath(); ctx.arc(p.x,cy,68,sA,eA,dir<0); ctx.stroke();
    }
    ctx.restore();
  }
  if(atk&&sk&&!sk.basic) drawSkillFX(p,sk,prog,feetY,dir);
}
/* 快捷颜色辅助 */
function C_(c,flash){return flash?'#fff':c;}

/* =========================================================
   剑魂 —— 蓝色剑道外套 + 太刀
   ========================================================= */
function _drawBlade(flash,atk,sk,walk,bob,pose){
  const lH=28,bH=52,hR=13;
  const C=c=>C_(c,flash);
  /* 腿: 深蓝修身裤 + 靴子 */
  ctx.fillStyle=C('#1a3d6e');
  ctx.fillRect(-6+walk*.5,-lH,11,lH); ctx.fillRect(-9-walk*.5,-lH,11,lH);
  ctx.fillStyle=C('#0f2544');
  ctx.fillRect(-7+walk*.5,-lH,12,10); ctx.fillRect(-10-walk*.5,-lH,12,10);
  ctx.fillStyle=C('#2a6acc'); ctx.fillRect(-6+walk*.5,-lH+2,10,5); ctx.fillRect(-9-walk*.5,-lH+2,10,5);
  /* 身体: 蓝色剑道外套 */
  ctx.fillStyle=C('#4db8ff'); roundRect(-12,-(lH+bH)+bob,24,bH,6); ctx.fill();
  ctx.fillStyle=C('#1a5090'); ctx.fillRect(-2,-(lH+bH)+bob+4,4,bH-14);
  /* 左胸护甲片 */
  ctx.fillStyle=C('#2a6acc');
  ctx.beginPath(); ctx.moveTo(-12,-(lH+bH*.88)+bob); ctx.lineTo(-2,-(lH+bH*.98)+bob);
  ctx.lineTo(-2,-(lH+bH*.72)+bob); ctx.lineTo(-12,-(lH+bH*.68)+bob); ctx.closePath(); ctx.fill();
  /* 高竖领 */
  ctx.fillStyle=C('#1a5090');
  ctx.beginPath(); ctx.moveTo(-6,-(lH+bH*.86)+bob); ctx.lineTo(0,-(lH+bH*.97)+bob);
  ctx.lineTo(6,-(lH+bH*.86)+bob); ctx.lineTo(4,-(lH+bH*.78)+bob); ctx.lineTo(-4,-(lH+bH*.78)+bob); ctx.closePath(); ctx.fill();
  ctx.fillStyle=C('#fff'); ctx.fillRect(-12,-(lH+bH*.22)+bob,24,3);
  /* 手臂 */
  ctx.strokeStyle=C('#1a3d6e'); ctx.lineWidth=7; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(9,-(lH+bH*.78)+bob); ctx.lineTo(pose.rax,pose.ray);
  ctx.moveTo(-9,-(lH+bH*.78)+bob); ctx.lineTo(pose.lax,pose.lay); ctx.stroke();
  ctx.fillStyle=C('#2a6acc'); ctx.fillRect(pose.rax-4,pose.ray-3,8,5);
  /* 太刀 */
  _katana(pose.rax,pose.ray,atk,sk,flash,pose.wAng);
  /* 头 + 发型 */
  const hy=-(lH+bH)-hR+bob;
  ctx.fillStyle=C('#f2cda0'); ctx.beginPath(); ctx.arc(0,hy,hR,0,7); ctx.fill();
  ctx.fillStyle=C('#1a5090'); ctx.fillRect(-hR*.9,hy-1,hR*1.8,4);
  ctx.fillStyle=C('#4db8ff');
  [[-hR*.8,hy-hR*.2,hR*1.45,hy-hR*.55,hR*.6,hy+hR*.15],
   [-hR*.4,hy-hR*.65,hR*.85,hy-hR*1.22,hR*.2,hy-hR*.38],
   [hR*.05,hy-hR*.98,hR*.4,hy-hR*1.6,hR*.12,hy-hR*.75]
  ].forEach(([x1,y1,x2,y2,x3,y3])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineTo(x3,y3);ctx.closePath();ctx.fill();});
  ctx.fillStyle=C('#1a3d6e');
  ctx.beginPath(); ctx.moveTo(-hR*.6,hy-hR*.3); ctx.lineTo(-hR*1.3,hy-hR*.05);
  ctx.lineTo(-hR*1.0,hy+hR*.45); ctx.lineTo(-hR*.45,hy+hR*.3); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#111'; ctx.fillRect(3,hy-3,4,4);
  ctx.fillStyle='#88ddff'; ctx.fillRect(4,hy-2,2,2);
}
function _katana(ax,ay,atk,sk,flash,wAng){
  const C=c=>C_(c,flash);
  let ang=atk?(sk?.key==='z'?-Math.PI*.72:sk?.key==='f'?-Math.PI*.06:sk?.type==='proj'?-.08:-Math.PI*.22):-Math.PI*.38;
  if(atk&&sk&&sk.basic&&wAng!=null) ang=wAng;
  ctx.save(); ctx.translate(ax,ay); ctx.rotate(ang);
  ctx.fillStyle=C('#dff0ff');
  ctx.beginPath(); ctx.moveTo(0,-1.5); ctx.lineTo(60,-1); ctx.lineTo(67,0); ctx.lineTo(60,1); ctx.lineTo(0,1.5); ctx.closePath(); ctx.fill();
  ctx.strokeStyle=C('rgba(255,255,255,.6)'); ctx.lineWidth=.8;
  ctx.beginPath(); ctx.moveTo(4,-1); ctx.lineTo(58,-.8); ctx.stroke();
  ctx.fillStyle=C('#5a9acc'); ctx.fillRect(-4,-7,3,14);
  ctx.fillStyle=C('#3a70aa'); ctx.fillRect(-5,-2,4,4);
  ctx.fillStyle=C('#1a3d6e'); ctx.fillRect(-22,-3,18,6);
  ctx.strokeStyle=C('#4db8ff'); ctx.lineWidth=1.5;
  for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(-20+i*4,-3);ctx.lineTo(-20+i*4,3);ctx.stroke();}
  ctx.restore();
}

/* =========================================================
   狂战士 —— 红色重甲 + 肩刺 + 巨剑
   ========================================================= */
function _drawBerserk(flash,atk,sk,walk,bob,pose){
  const lH=28,bH=52,hR=14;
  const C=c=>C_(c,flash);
  /* 腿: 厚重护腿 */
  ctx.fillStyle=C('#5a1010');
  ctx.fillRect(-8+walk*.5,-lH,14,lH); ctx.fillRect(-10-walk*.5,-lH,14,lH);
  ctx.fillStyle=C('#3e0a0a');
  ctx.fillRect(-8+walk*.5,-lH,14,10); ctx.fillRect(-10-walk*.5,-lH,14,10);
  ctx.fillStyle=C('#8b2020'); ctx.fillRect(-6+walk*.5,-lH+2,8,7); ctx.fillRect(-8-walk*.5,-lH+2,8,7);
  /* 身体: 宽厚胸甲 */
  ctx.fillStyle=C('#c0392b'); roundRect(-14,-(lH+bH)+bob,28,bH,6); ctx.fill();
  ctx.fillStyle=C('#8b2020'); ctx.fillRect(-14,-(lH+bH*.5)+bob,28,4); ctx.fillRect(-2,-(lH+bH)+bob+4,4,bH-14);
  /* 双肩尖刺甲 */
  const spk=c=>{ctx.fillStyle=C(c);};
  spk('#ff7a3c');
  ctx.beginPath(); ctx.moveTo(-14,-(lH+bH*.85)+bob); ctx.lineTo(-24,-(lH+bH*.78)+bob); ctx.lineTo(-14,-(lH+bH*.65)+bob); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(14,-(lH+bH*.85)+bob);  ctx.lineTo(24,-(lH+bH*.78)+bob);  ctx.lineTo(14,-(lH+bH*.65)+bob);  ctx.closePath(); ctx.fill();
  spk('#cc6020');
  ctx.beginPath(); ctx.moveTo(-18,-(lH+bH*.8)+bob); ctx.lineTo(-26,-(lH+bH*.76)+bob); ctx.lineTo(-18,-(lH+bH*.7)+bob); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(18,-(lH+bH*.8)+bob);  ctx.lineTo(26,-(lH+bH*.76)+bob);  ctx.lineTo(18,-(lH+bH*.7)+bob);  ctx.closePath(); ctx.fill();
  /* 腰带扣 */
  ctx.fillStyle=C('#cc8800'); ctx.fillRect(-6,-(lH+bH*.18)+bob,12,8);
  ctx.fillStyle=C('#ffcc00'); ctx.fillRect(-3,-(lH+bH*.17)+bob,6,6);
  /* 手臂(粗) */
  ctx.strokeStyle=C('#5a1010'); ctx.lineWidth=10; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(11,-(lH+bH*.78)+bob); ctx.lineTo(pose.rax,pose.ray);
  ctx.moveTo(-11,-(lH+bH*.78)+bob); ctx.lineTo(pose.lax,pose.lay); ctx.stroke();
  ctx.fillStyle=C('#8b2020'); ctx.fillRect(pose.rax-5,pose.ray-4,10,7);
  _greatsword(pose.rax,pose.ray,atk,sk,flash,pose.wAng);
  /* 头 + 发型 */
  const hy=-(lH+bH)-hR+bob;
  ctx.fillStyle=C('#f2cda0'); ctx.beginPath(); ctx.arc(0,hy,hR,0,7); ctx.fill();
  if(!flash){ctx.strokeStyle='#a06040';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-2,hy-3);ctx.lineTo(3,hy+3);ctx.stroke();}
  ctx.fillStyle=C('#7a1f10');
  ctx.beginPath(); ctx.arc(-hR*.2,hy-hR*.72,hR*.95,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-hR,hy-hR*.45); ctx.lineTo(-hR*1.7,hy-hR*.82); ctx.lineTo(-hR*1.2,hy-hR*.15); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(hR*.4,hy-hR*.65); ctx.lineTo(hR*1.5,hy-hR*1.1);  ctx.lineTo(hR*1.1,hy-hR*.25); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-hR*.1,hy-hR*1.1); ctx.lineTo(hR*.3,hy-hR*1.55); ctx.lineTo(hR*.5,hy-hR*.9);  ctx.closePath(); ctx.fill();
  ctx.fillStyle=C('#cc2a1a'); ctx.fillRect(-hR*1.15,hy-hR*.1,hR*2.3,hR*.3);
  ctx.fillStyle='#111'; ctx.fillRect(2,hy-3,5,3);
  ctx.fillStyle='#ff4400'; ctx.fillRect(3,hy-2,2,1.5);
}
function _greatsword(ax,ay,atk,sk,flash,wAng){
  const C=c=>C_(c,flash);
  let ang=atk?(sk?.key==='z'?-Math.PI*.1:sk?.key==='f'?-Math.PI*.38:sk?.key==='g'?-Math.PI*.55:-Math.PI*.25):-Math.PI*.45;
  if(atk&&sk&&sk.basic&&wAng!=null) ang=wAng;

  ctx.fillStyle=C('#606068');
  ctx.beginPath(); ctx.moveTo(0,-7); ctx.lineTo(66,-5.5); ctx.lineTo(78,0); ctx.lineTo(66,5.5); ctx.lineTo(0,7); ctx.closePath(); ctx.fill();

  ctx.fillStyle=C('#b0b0be');
  ctx.beginPath(); ctx.moveTo(4,-6); ctx.lineTo(64,-4); ctx.lineTo(64,0); ctx.lineTo(4,0); ctx.closePath(); ctx.fill();

  ctx.fillStyle=C('#c0392b'); ctx.fillRect(22,-2.5,32,5);

  ctx.fillStyle=C('#2a0a0a'); ctx.fillRect(-30,-4,24,8);
  ctx.fillStyle=C('#ff7a3c'); ctx.fillRect(-9,-5,5,10);
  ctx.restore();
}

/* =========================================================
   鬼泣 —— 紫色衣袍 + 斗篷 + 幽灵锯齿剑
   ========================================================= */
function _drawSpectre(flash,atk,sk,walk,bob,pose){
  const lH=28,bH=52,hR=13;
  const C=c=>C_(c,flash);
  const t=performance.now()/220;
  ctx.fillStyle=C('#280e50');
  ctx.fillRect(-5+walk*.4,-lH,9,lH); ctx.fillRect(-7-walk*.4,-lH,9,lH);
  ctx.fillStyle=C('#1a0836');
  ctx.fillRect(-5+walk*.4,-lH,9,8); ctx.fillRect(-7-walk*.4,-lH,9,8);
  /* 斗篷 */
  ctx.save(); ctx.globalAlpha=flash?0.9:.8; ctx.fillStyle=C('#1e0640');
  ctx.beginPath();

  ctx.quadraticCurveTo(-34+Math.sin(t)*7,-(lH*.55),-22+Math.sin(t+1)*5,-lH+9);

  ctx.lineTo(-5,-(lH+bH*.72)+bob); ctx.closePath(); ctx.fill(); ctx.restore();
  /* 身体 */
  ctx.fillStyle=C('#7d3cc9'); roundRect(-11,-(lH+bH)+bob,22,bH,7); ctx.fill();
  ctx.fillStyle=C('#3f1d6e'); ctx.fillRect(-2,-(lH+bH)+bob+5,4,bH-18);
  /* 胸口宝石 */
  ctx.fillStyle=C('#b98cff'); ctx.beginPath(); ctx.arc(0,-(lH+bH*.7)+bob,4,0,7); ctx.fill();
  ctx.fillStyle=C('#fff');    ctx.beginPath(); ctx.arc(0,-(lH+bH*.7)+bob,2,0,7); ctx.fill();
  ctx.strokeStyle=C('#b98cff'); ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-6,-(lH+bH*.9)+bob); ctx.lineTo(0,-(lH+bH*.97)+bob); ctx.lineTo(6,-(lH+bH*.9)+bob); ctx.stroke();
  ctx.fillStyle=C('#b98cff'); ctx.fillRect(-11,-(lH+bH*.24)+bob,22,4);
  /* 手臂 */
  ctx.strokeStyle=C('#280e50'); ctx.lineWidth=6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(7,-(lH+bH*.76)+bob); ctx.lineTo(pose.rax,pose.ray);
  ctx.moveTo(-7,-(lH+bH*.76)+bob); ctx.lineTo(pose.lax,pose.lay); ctx.stroke();
  _ghostblade(pose.rax,pose.ray,atk,sk,flash,t,pose.wAng);
  /* 头 */
  const hy=-(lH+bH)-hR+bob;
  ctx.fillStyle=C('#f0cba0'); ctx.beginPath(); ctx.arc(0,hy,hR,0,7); ctx.fill();
  ctx.fillStyle=C('#7d3cc9'); ctx.beginPath(); ctx.arc(-hR*.2,hy-hR*.28,hR*.75,Math.PI,0); ctx.fill();
  ctx.strokeStyle=C('#b98cff'); ctx.lineWidth=3.5; ctx.lineCap='round';
  [0,1,2].forEach(i=>{
    ctx.beginPath();
    ctx.moveTo(-hR*.5+i*hR*.35,hy-hR*.25);
    ctx.quadraticCurveTo(-hR*(1.25+i*.25)+Math.sin(t+i)*5,hy+hR*.65+i*hR*.32,-hR*(.85+i*.15)+Math.sin(t+i+1)*6,hy+hR*1.65+i*hR*.48);
    ctx.stroke();
  });
  ctx.fillStyle='#111'; ctx.fillRect(2,hy-3,4,4);
  ctx.fillStyle='#9955ff'; ctx.fillRect(3,hy-2,2,2);
}
function _ghostblade(ax,ay,atk,sk,flash,t,wAng){

  ctx.fillStyle=C('#b98cff'); ctx.beginPath(); ctx.arc(-4,-1,3,0,7); ctx.fill();
  ctx.fillStyle=C('#280e50'); ctx.fillRect(-22,-2.5,18,5);
