  ctx.restore();
}

/* =========================================================
   阿修罗 —— 青色法袍 + 符文 + 念气剑
   ========================================================= */
function _drawAsura(flash,atk,sk,walk,bob,pose){
  const lH=28,bH=52,hR=13;
  const C=c=>C_(c,flash);
  const t=performance.now()/190;
  /* 法袍下摆 */
  ctx.save(); ctx.globalAlpha=flash?.9:.68; ctx.fillStyle=C('#0c5a4a');
  ctx.beginPath(); ctx.moveTo(-16,-lH+bob+2); ctx.lineTo(-20,-lH+20+Math.sin(t)*4);
  ctx.lineTo(20,-lH+20+Math.sin(t+1)*4); ctx.lineTo(16,-lH+bob+2); ctx.closePath(); ctx.fill(); ctx.restore();
  ctx.fillStyle=C('#0c3a2e'); ctx.fillRect(-4+walk*.3,-lH,8,lH*.65); ctx.fillRect(-6-walk*.3,-lH,8,lH*.65);
  /* 身体 */
  ctx.fillStyle=C('#16a085'); roundRect(-12,-(lH+bH)+bob,24,bH,7); ctx.fill();
  ctx.fillStyle=C('#0c5a4a'); ctx.fillRect(-12,-(lH+bH*.25)+bob,24,5); ctx.fillRect(-2,-(lH+bH)+bob+5,4,bH*.6);
  ctx.strokeStyle=C('#7fe0ff'); ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-6,-(lH+bH*.9)+bob); ctx.lineTo(0,-(lH+bH*.97)+bob); ctx.lineTo(6,-(lH+bH*.9)+bob); ctx.stroke();
  /* 胸口符文圆 */
  ctx.strokeStyle=C('#aafff0'); ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.arc(0,-(lH+bH*.62)+bob,6,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-6,-(lH+bH*.62)+bob); ctx.lineTo(6,-(lH+bH*.62)+bob); ctx.stroke();
  /* 宽袖 */
  if(!atk||(sk&&sk.type==='buff')){
    ctx.save(); ctx.globalAlpha=.72; ctx.fillStyle=C('#0c5a4a');
    ctx.beginPath(); ctx.moveTo(10,-(lH+bH*.78)+bob); ctx.lineTo(20,-(lH+bH*.68)+bob); ctx.lineTo(16,-(lH+bH*.48)+bob); ctx.lineTo(9,-(lH+bH*.55)+bob); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-10,-(lH+bH*.78)+bob); ctx.lineTo(-20,-(lH+bH*.68)+bob); ctx.lineTo(-16,-(lH+bH*.48)+bob); ctx.lineTo(-9,-(lH+bH*.55)+bob); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  /* 手臂 */
  ctx.strokeStyle=C('#0c3a2e'); ctx.lineWidth=7; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(8,-(lH+bH*.76)+bob); ctx.lineTo(pose.rax,pose.ray);
  ctx.moveTo(-8,-(lH+bH*.76)+bob); ctx.lineTo(pose.lax,pose.lay); ctx.stroke();
  /* 能量手掌 */
  if(atk){
    ctx.save(); ctx.globalAlpha=.82+.18*Math.sin(performance.now()/55);
    ctx.fillStyle=C('#7fe0ff'); ctx.beginPath(); ctx.arc(pose.rax,pose.ray,9,0,7); ctx.fill();
    ctx.globalAlpha=.5; ctx.fillStyle=C('#fff'); ctx.beginPath(); ctx.arc(pose.rax,pose.ray,4,0,7); ctx.fill();
    if(sk&&(sk.type==='proj'||sk.type==='aoe'||sk.type==='ult')){
      ctx.globalAlpha=.72+.18*Math.sin(performance.now()/55);
      ctx.fillStyle=C('#7fe0ff'); ctx.beginPath(); ctx.arc(pose.lax,pose.lay,8,0,7); ctx.fill();
    }
    ctx.restore();
  }
  _kiSword(pose.rax,pose.ray,atk,sk,flash,t,pose.wAng);
  /* 头 */
  const hy=-(lH+bH)-hR+bob;
  ctx.fillStyle=C('#f2cda0'); ctx.beginPath(); ctx.arc(0,hy,hR,0,7); ctx.fill();
  ctx.fillStyle=C('#16a085'); ctx.beginPath(); ctx.arc(0,hy-hR*.85,hR*.6,0,7); ctx.fill();
  ctx.fillRect(-3,hy-hR*.92,6,-hR*.85);
  ctx.beginPath(); ctx.arc(0,hy-hR*1.78,6,0,7); ctx.fill();
  ctx.fillStyle=C('#0a3d30'); ctx.fillRect(-hR*.55,hy-hR*1.02,hR*1.1,hR*.25);
  ctx.fillStyle=C('#0c5a4a'); ctx.fillRect(-hR*.85,hy-hR*.35,hR*.3,hR*.85);
  ctx.fillStyle='#111'; ctx.fillRect(2,hy-3,4,4);
  ctx.fillStyle='#00ddcc'; ctx.fillRect(3,hy-2,2,2);
}
function _kiSword(ax,ay,atk,sk,flash,t,wAng){
  const C=c=>C_(c,flash);
  let ang=atk?(sk?.type==='buff'?-Math.PI*.62:sk?.type==='ult'?-Math.PI*.05:sk?.key==='s'?-Math.PI*.55:-Math.PI*.12):-Math.PI*.28;
  if(atk&&sk&&sk.basic&&wAng!=null) ang=wAng;
  ctx.save(); ctx.translate(ax,ay); ctx.rotate(ang);
  if(!flash){[14,9,5].forEach((lw,i)=>{ctx.strokeStyle=`rgba(127,224,255,${.12+i*.07})`;ctx.lineWidth=lw;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(68,0);ctx.stroke();});}
  ctx.fillStyle=C('#c8f4ff');
  ctx.beginPath(); ctx.moveTo(0,-3); ctx.lineTo(63,-1.8); ctx.lineTo(72,0); ctx.lineTo(63,1.8); ctx.lineTo(0,3); ctx.closePath(); ctx.fill();
  ctx.strokeStyle=C('#fff'); ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(3,0); ctx.lineTo(68,0); ctx.stroke();
  if(!flash){
    ctx.globalAlpha=.7+.3*Math.sin((t||0)*2.5);
    for(let i=0;i<3;i++){ctx.fillStyle='#7fe0ff';ctx.beginPath();ctx.arc(20+i*18+Math.sin(performance.now()/65+i)*4,Math.sin(performance.now()/85+i*2)*3.5,2.5,0,7);ctx.fill();}
  }
  ctx.fillStyle=C('#16a085'); ctx.fillRect(-5,-8,4,16);
  ctx.fillStyle=C('#7fe0ff'); ctx.beginPath(); ctx.arc(-3,0,5,0,7); ctx.fill();
  ctx.fillStyle=C('#0c3a2e'); ctx.fillRect(-24,-3,20,6);
  ctx.restore();
}

/* ===================== 职业技能姿势计算 ===================== */
function getSkillPose(cls, sk, prog, legH, bodyH){
  const BH=bodyH;
  if(!sk||!sk.key) return {rax:16,ray:-(legH+BH*0.25),lax:-13,lay:-(legH+BH*0.25)};
  if(sk.basic){
    // 鬼剑士太刀平砍三连: 斜劈 → 反手横扫 → 突刺(双手分离, 随进度挥动)
    const c=sk.combo||1, t=prog;
    if(c===1){ // 第一段: 自右上向左下斜劈
      const s=Math.min(1,t*1.25);
      return {rax:lerp(4,32,s), ray:lerp(-(legH+BH*1.08),-(legH+BH*0.40),s),
              lax:lerp(-6,-18,s), lay:lerp(-(legH+BH*0.48),-(legH+BH*0.66),s),
              wAng:lerp(-2.3,-0.10,s)};
    }
    if(c===2){ // 第二段: 反手由下往上回斩
      const s=Math.min(1,t*1.25);
      return {rax:lerp(32,14,s), ray:lerp(-(legH+BH*0.34),-(legH+BH*1.04),s),
              lax:lerp(8,-12,s), lay:lerp(-(legH+BH*0.72),-(legH+BH*0.48),s),
              wAng:lerp(-0.05,-2.55,s)};
    }
    // 第三段: 双手前推突刺 + 身体前冲
    const s=t<0.45?t/0.45:1;
    return {rax:lerp(10,40,s), ray:-(legH+BH*0.60),
            lax:lerp(-8,20,s), lay:-(legH+BH*0.55),
            wAng:lerp(-0.45,0.04,s), lunge:Math.sin(t*Math.PI)*9};
  }
  // 按技能类型归类到动作原型, 每种都随进度 prog 演变(有前摇→爆发→收招)
  const L=legH, B=BH, t=prog, sh=-(L+B*0.75);
  const P=o=>Object.assign({rax:14,ray:sh,lax:-12,lay:sh},o);
  let arch;
  if(sk.launch && sk.type!=='aoe' && sk.type!=='proj') arch='slashUp';            // 上挑(挑空)
  else if(sk.type==='proj')  arch='cast';                                          // 投射:收手→推出
  else if(sk.type==='dash')  arch='thrust';                                        // 突进刺
  else if(sk.type==='buff')  arch='channel';                                       // 蓄力:双拳上举
  else if(sk.type==='ult')   arch='burst';                                         // 大招:蓄力→张开
  else if(sk.type==='aoe')   arch = sk.ox>40 ? (sk.launch?'slashDown':'cast') : 'burst';
  else if(sk.type==='multi') arch='slashWide';                                     // 连斩:大横扫
  else                       arch='slashWide';                                     // 普通近战
  switch(arch){
    case 'slashUp':{ const s=Math.min(1,t*1.3);     // 由下往上挑
      return P({rax:lerp(22,16,s),ray:lerp(-(L+B*0.32),-(L+B*1.16),s),lax:lerp(8,-10,s),lay:-(L+B*0.5),wAng:lerp(0.3,-2.45,s)}); }
    case 'slashDown':{                               // 高举→下劈
      if(t<0.4){ const s=t/0.4; return P({rax:lerp(18,6,s),ray:lerp(sh,-(L+B*1.22),s),lax:-14,lay:lerp(sh,-(L+B*0.9),s),wAng:lerp(-1.0,-2.5,s)}); }
      const s=(t-0.4)/0.6; return P({rax:lerp(6,36,s),ray:lerp(-(L+B*1.22),-(L+B*0.34),s),lax:lerp(-14,-6,s),lay:lerp(-(L+B*0.9),-(L+B*0.6),s),wAng:lerp(-2.5,-0.15,s),lunge:Math.sin(s*Math.PI)*6}); }
    case 'slashWide':{ const s=Math.min(1,t*1.25);   // 从后扫到前
      return P({rax:lerp(-6,38,s),ray:-(L+B*0.62),lax:lerp(18,-14,s),lay:-(L+B*0.55),wAng:lerp(-2.0,0.35,s),lunge:Math.sin(t*Math.PI)*4}); }
    case 'thrust':{ const s=t<0.5?t/0.5:1;           // 前冲突刺
      return P({rax:lerp(8,40,s),ray:-(L+B*0.58),lax:lerp(-4,16,s),lay:-(L+B*0.5),wAng:lerp(-0.6,0.05,s),lunge:Math.sin(t*Math.PI)*13}); }
    case 'cast':{                                    // 收手蓄力→双手前推
      if(t<0.35){ const s=t/0.35; return P({rax:lerp(14,2,s),ray:lerp(sh,-(L+B*0.8),s),lax:lerp(-12,0,s),lay:-(L+B*0.72),wAng:-1.2}); }
      const s=(t-0.35)/0.65; return P({rax:lerp(2,36,s),ray:-(L+B*0.62),lax:lerp(0,22,s),lay:-(L+B*0.6),wAng:lerp(-1.2,0.1,s),lunge:Math.sin(s*Math.PI)*4}); }
    case 'burst':{                                   // 蓄力收拢→双臂炸开
      if(t<0.4){ const s=t/0.4; return P({rax:lerp(14,5,s),ray:lerp(sh,-(L+B*0.46),s),lax:lerp(-12,-5,s),lay:lerp(sh,-(L+B*0.46),s),wAng:-0.5}); }
      const s=(t-0.4)/0.6; return P({rax:lerp(5,30,s),ray:lerp(-(L+B*0.46),-(L+B*0.86),s),lax:lerp(-5,-30,s),lay:lerp(-(L+B*0.46),-(L+B*0.86),s),wAng:lerp(-0.5,-1.1,s)}); }
    case 'channel':{ const j=Math.sin(t*Math.PI*7)*2.2;  // 双拳上举(蓄力抖动)
      return P({rax:18+j,ray:-(L+B*1.06),lax:-18-j,lay:-(L+B*1.06),wAng:-1.5}); }
  }
  return P({rax:28,ray:-(L+B*0.58),lax:-8,lay:-(L+B*0.55)});
}

/* ===================== 技能世界空间特效 ===================== */
function drawSkillFX(p, sk, prog, feetY, dir){
  if(SKILLFX.ready) return;             // 已接入客户端真实特效精灵(由 spawnSkillFX→effects 渲染), 此处矢量特效仅作回退
  const x=p.x, k=sk.key, cls=p.clsKey;
  const a=Math.max(0, 1-prog);          // 随进度淡出
  ctx.save(); ctx.lineCap='round';

  switch(cls){
    /* ── 剑魂 ─────────────────────────────── */
    case 'blade':
      if(k==='a'){  // 三段斩: 三条依次出现的剑气
        [0,1,2].forEach(i=>{
          if(prog<(i+1)*0.34){
            ctx.globalAlpha=(1-prog)*0.85; ctx.strokeStyle='#b8e4ff'; ctx.lineWidth=3+i;
            ctx.beginPath(); ctx.moveTo(x+dir*28,feetY-105+i*18); ctx.lineTo(x+dir*130,feetY-88+i*18); ctx.stroke();
          }
        });
      }
      if(k==='s'){  // 波动剑: 同心圆波纹向前扩散
        const r=35+prog*70;
        ctx.globalAlpha=a*0.75; ctx.strokeStyle='#4db8ff'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.ellipse(x+dir*(r+18),feetY-72,r*0.55,r*0.28,0,0,Math.PI*2); ctx.stroke();
        ctx.globalAlpha=a*0.4; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.ellipse(x+dir*(r-16+18),feetY-72,(r-16)*0.55,(r-16)*0.28,0,0,Math.PI*2); ctx.stroke();
      }
      if(k==='f'){  // 拔刀斩: 大半圆弧
        ctx.globalAlpha=a*0.9; ctx.strokeStyle='#bfe6ff'; ctx.lineWidth=8;
        ctx.beginPath(); ctx.arc(x, feetY-82, 82, dir>0?-Math.PI*0.55:Math.PI*1.55, dir>0?Math.PI*0.55:-Math.PI*0.55, dir<0); ctx.stroke();
        ctx.globalAlpha=a*0.4; ctx.strokeStyle='#fff'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.arc(x, feetY-82, 82, dir>0?-Math.PI*0.55:Math.PI*1.55, dir>0?Math.PI*0.55:-Math.PI*0.55, dir<0); ctx.stroke();
      }
      if(k==='z'){  // 上挑: 垂直向上剑光
        ctx.globalAlpha=a*0.85; ctx.strokeStyle='#bfe6ff'; ctx.lineWidth=6;
        ctx.beginPath(); ctx.moveTo(x+dir*22,feetY-70); ctx.lineTo(x+dir*18,feetY-70-60-prog*40); ctx.stroke();
        ctx.globalAlpha=a*0.4; ctx.strokeStyle='#fff'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(x+dir*22,feetY-70); ctx.lineTo(x+dir*18,feetY-70-50-prog*30); ctx.stroke();
      }
      if(k==='d'){  // 瞬影斩: 残影
        ctx.globalAlpha=a*0.3; ctx.fillStyle='#4db8ff';
        ctx.fillRect(x+dir*14-11, feetY-95, 22, 70);
        ctx.globalAlpha=a*0.15;
        ctx.fillRect(x+dir*28-11, feetY-95, 22, 70);
      }
      if(k==='g'){  // 极·武剑术: 多层剑气环
        [0,1,2,3].forEach(i=>{
          ctx.globalAlpha=Math.max(0,a*0.65-i*0.12); ctx.strokeStyle=i%2?'#fff':'#4db8ff'; ctx.lineWidth=5-i;
          ctx.beginPath(); ctx.arc(x, feetY-90, 55+i*20, 0, Math.PI*2); ctx.stroke();
        });
        // 8条放射线
        for(let i=0;i<8;i++){
          const ang=i*(Math.PI/4)+prog*Math.PI;
          ctx.globalAlpha=a*0.55; ctx.strokeStyle='#fff'; ctx.lineWidth=2;
          ctx.beginPath(); ctx.moveTo(x+Math.cos(ang)*30,feetY-90+Math.sin(ang)*18);
          ctx.lineTo(x+Math.cos(ang)*90,feetY-90+Math.sin(ang)*50); ctx.stroke();
        }
      }
      break;

    /* ── 狂战士 ────────────────────────────── */
    case 'berserk':
      if(k==='z'){  // 暴走崩斩: 落地冲击波
        if(prog>0.5){
          const r2=20+(prog-0.5)*180;
          ctx.globalAlpha=(1-prog)*1.4; ctx.strokeStyle='#ff5a3c'; ctx.lineWidth=5;
          ctx.beginPath(); ctx.ellipse(x,feetY-2,r2*0.7,r2*0.32,0,0,Math.PI*2); ctx.stroke();
        }
      }
      if(k==='a'){  // 怒气爆发: 火焰上涌
        const r3=15+prog*85;
        ctx.globalAlpha=a*0.65; ctx.fillStyle='#ff2a1a';
        ctx.beginPath(); ctx.ellipse(x,feetY-55,r3*0.7,r3*0.38,0,0,Math.PI*2); ctx.fill();
        // 3根火舌
        [0,1,2].forEach(i=>{
          const ox=Math.sin(performance.now()/80+i*2)*22, h=40+i*18+prog*30;
          ctx.globalAlpha=a*0.7; ctx.strokeStyle=i%2?'#ff5500':'#ff2a2a'; ctx.lineWidth=4-i;
          ctx.beginPath(); ctx.moveTo(x+ox*dir,feetY-50); ctx.lineTo(x+ox*dir*0.6,feetY-50-h); ctx.stroke();
        });
      }
      if(k==='s'){  // 血气唤醒: 脚下血气圆扩散
        const r4=25+prog*100;
        ctx.globalAlpha=a*0.5; ctx.fillStyle='#cc1a1a';
        ctx.beginPath(); ctx.ellipse(x,feetY,r4,r4*0.38,0,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=a*0.8; ctx.strokeStyle='#ff2a2a'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.ellipse(x,feetY,r4,r4*0.38,0,0,Math.PI*2); ctx.stroke();
      }
      if(k==='f'){  // 暴击波: 水平冲击波
        const len=60+prog*80;
        ctx.globalAlpha=a*0.8; ctx.strokeStyle='#ffb35a'; ctx.lineWidth=10;
        ctx.beginPath(); ctx.moveTo(x+dir*22,feetY-60); ctx.lineTo(x+dir*(22+len),feetY-60); ctx.stroke();
        ctx.globalAlpha=a*0.6; ctx.strokeStyle='#fff'; ctx.lineWidth=4;
        ctx.beginPath(); ctx.moveTo(x+dir*22,feetY-60); ctx.lineTo(x+dir*(22+len*0.7),feetY-60); ctx.stroke();
      }
      if(k==='d'){  // 崩山击: 速度线
        [0,1,2].forEach(i=>{
          ctx.globalAlpha=a*0.4; ctx.strokeStyle='#ff8c42'; ctx.lineWidth=2;
          ctx.beginPath(); ctx.moveTo(x-dir*30,feetY-40-i*20); ctx.lineTo(x-dir*100,feetY-40-i*20); ctx.stroke();
        });
      }
      if(k==='g'){  // 血气之刃: 旋转剑痕
        for(let i=0;i<6;i++){
          const ang=prog*Math.PI*4+i*(Math.PI*2/6);
          const r5=45+Math.sin(prog*Math.PI)*25;
          ctx.globalAlpha=a*0.65; ctx.strokeStyle='#ff2a2a'; ctx.lineWidth=4;
          ctx.beginPath();
          ctx.moveTo(x+Math.cos(ang)*r5*0.35, feetY-82+Math.sin(ang)*r5*0.2);
          ctx.lineTo(x+Math.cos(ang)*r5,      feetY-82+Math.sin(ang)*r5*0.5); ctx.stroke();
        }
        ctx.globalAlpha=a*0.3; ctx.fillStyle='#ff1a1a';
        ctx.beginPath(); ctx.arc(x,feetY-82,18+prog*30,0,Math.PI*2); ctx.fill();
      }
      break;

    /* ── 鬼泣 ──────────────────────────────── */
    case 'spectre':
      if(k==='z'){  // 鬼斩: 紫色残影刀光
        ctx.globalAlpha=a*0.6; ctx.fillStyle='#7d3cc9';
        ctx.fillRect(x+dir*12-10, feetY-95, 20, 68);
        ctx.globalAlpha=a*0.3; ctx.strokeStyle='#b98cff'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(x+dir*14,feetY-100); ctx.lineTo(x+dir*55,feetY-55); ctx.stroke();
      }
      if(k==='s'){  // 冰玦: 冰晶散射
        [0,1,2,3,4].forEach(i=>{
          const ang=i*(Math.PI*2/5)+prog*Math.PI;
          const r6=18+prog*46;
          ctx.globalAlpha=a*0.75; ctx.fillStyle='#7fdfff';
          ctx.beginPath(); ctx.arc(x+dir*(48+r6)+Math.cos(ang)*r6*0.45, feetY-72+Math.sin(ang)*r6*0.28, 4-i*0.5,0,7); ctx.fill();
        });
        // 冰晶核
        ctx.globalAlpha=a*0.9; ctx.strokeStyle='#aaeeff'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(x+dir*50,feetY-72,10,0,Math.PI*2); ctx.stroke();
      }
      if(k==='a'){  // 鬼影闪: 分身轨迹
        [1,2].forEach(i=>{
          ctx.globalAlpha=a*(0.3-i*0.1); ctx.fillStyle='#9b6cff';
          ctx.fillRect(x+dir*(i*20)-10, feetY-92, 20, 64);
        });
      }
      if(k==='d'){  // 阴影剑舞: 多个分身旋转
        [0,1,2].forEach(i=>{
          const ang=prog*Math.PI*2+i*(Math.PI*2/3);
          const r7=34;
          ctx.globalAlpha=a*(0.38-i*0.1); ctx.fillStyle=i%2?'#9b6cff':'#d0a6ff';
          ctx.fillRect(x+Math.cos(ang)*r7-9, feetY-88+Math.sin(ang)*r7*0.45, 18, 58);
        });
      }
      if(k==='f'){  // 鬼神·落: 落地冲击圆 + 上方光柱
        if(prog>0.4){
          const r8=20+(prog-0.4)*100;
          ctx.globalAlpha=(1-prog)*1.2; ctx.strokeStyle='#9b6cff'; ctx.lineWidth=5;
          ctx.beginPath(); ctx.ellipse(x,feetY-4,r8*0.65,r8*0.3,0,0,Math.PI*2); ctx.stroke();
        }
        ctx.globalAlpha=a*0.55; ctx.strokeStyle='#d0a6ff'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(x,feetY-120); ctx.lineTo(x,feetY-40); ctx.stroke();
      }
      if(k==='g'){  // 帕授·虚影: 幽灵放射
        [0,1,2,3].forEach(i=>{
          const ang=prog*Math.PI*3+i*(Math.PI/2);
          ctx.globalAlpha=a*(0.5-i*0.1); ctx.fillStyle=i%2?'#9b6cff':'#c8a0ff';
          const r9=40+i*15, ex=x+Math.cos(ang)*r9, ey=feetY-85+Math.sin(ang)*r9*0.5;
          ctx.fillRect(ex-9, ey-30, 18, 55);
        });
        ctx.globalAlpha=a*0.25; ctx.fillStyle='#b98cff';
        ctx.beginPath(); ctx.arc(x,feetY-85,20+prog*50,0,Math.PI*2); ctx.fill();
      }
      break;

    /* ── 阿修罗 ─────────────────────────────── */
    case 'asura':
      if(k==='z'||k==='a'||k==='d'){  // 能量前冲波
        const r10=20+prog*65, ox=k==='a'?0:dir*22;
        ctx.globalAlpha=a*0.72; ctx.strokeStyle='#7fe0ff'; ctx.lineWidth=4;
        ctx.beginPath(); ctx.ellipse(x+ox+dir*r10, feetY-68, r10*0.52, r10*0.26, 0, 0, Math.PI*2); ctx.stroke();
        ctx.globalAlpha=a*0.35; ctx.fillStyle='#7fe0ff';
        ctx.beginPath(); ctx.ellipse(x+ox+dir*r10, feetY-68, r10*0.52, r10*0.26, 0, 0, Math.PI*2); ctx.fill();
        if(k==='a'){  // 无双波额外:双侧扩散
          ctx.globalAlpha=a*0.5; ctx.strokeStyle='#aafff0'; ctx.lineWidth=3;
          ctx.beginPath(); ctx.ellipse(x-dir*r10, feetY-68, r10*0.52, r10*0.26, 0, 0, Math.PI*2); ctx.stroke();
        }
        if(k==='d'){  // 爆炎:叠加火焰
          ctx.globalAlpha=a*0.55; ctx.fillStyle='#ff9a3c';
          ctx.beginPath(); ctx.ellipse(x+dir*(40+prog*50), feetY-65, 28+prog*18, 16+prog*9, 0, 0, Math.PI*2); ctx.fill();
          ctx.globalAlpha=a*0.4; ctx.fillStyle='#ffcf4d';
          ctx.beginPath(); ctx.arc(x+dir*(44+prog*48), feetY-68, 14+prog*10, 0, Math.PI*2); ctx.fill();
        }
      }
      if(k==='s'){  // 大冰雹: 5颗冰块从上坠落
        [-50,-22,8,36,62].forEach((ox2,i)=>{
          const fallY=feetY-180+prog*(130+i*10);
          ctx.globalAlpha=a*0.82; ctx.fillStyle='#7fe0ff';
          ctx.beginPath(); ctx.arc(x+dir*ox2, fallY, 7-i*0.5, 0, 7); ctx.fill();
          ctx.strokeStyle='#aaeeff'; ctx.lineWidth=1.5;
          ctx.beginPath(); ctx.arc(x+dir*ox2, fallY, 7-i*0.5, 0, 7); ctx.stroke();
          if(fallY>feetY-30){  // 落地溅射
            ctx.globalAlpha=a*0.5; ctx.strokeStyle='#7fdfff'; ctx.lineWidth=2;
            ctx.beginPath(); ctx.ellipse(x+dir*ox2, feetY-2, 16, 6, 0, 0, Math.PI*2); ctx.stroke();
          }
        });
      }
      if(k==='f'){  // 不动明王阵: 地面法阵
        const r11=38+prog*28;
        ctx.globalAlpha=0.55+0.2*Math.sin(performance.now()/75); ctx.strokeStyle='#ffd24d'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(x,feetY-4,r11,0,Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(x,feetY-4,r11*0.6,0,Math.PI*2); ctx.stroke();
        for(let i=0;i<8;i++){
          const ang=i*(Math.PI/4)+prog*Math.PI;
          ctx.beginPath(); ctx.moveTo(x+Math.cos(ang)*r11*0.6,feetY-4+Math.sin(ang)*r11*0.3);
          ctx.lineTo(x+Math.cos(ang)*r11,feetY-4+Math.sin(ang)*r11*0.5); ctx.stroke();
        }
      }
      if(k==='g'){  // 修罗·灭魂: 能量射线爆发
        for(let i=0;i<8;i++){
          const ang=i*(Math.PI/4)+prog*Math.PI*2;
          const r12=35+prog*90;
          ctx.globalAlpha=a*0.65; ctx.strokeStyle=i%2?'#7fe0ff':'#aaffe8'; ctx.lineWidth=3+Math.sin(i)*1;
          ctx.beginPath(); ctx.moveTo(x,feetY-85); ctx.lineTo(x+Math.cos(ang)*r12,feetY-85+Math.sin(ang)*r12*0.5); ctx.stroke();
        }
        ctx.globalAlpha=a*0.38; ctx.fillStyle='#7fe0ff';
        ctx.beginPath(); ctx.arc(x,feetY-85,18+prog*65,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=a*0.7; ctx.strokeStyle='#fff'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.arc(x,feetY-85,18,0,Math.PI*2); ctx.stroke();
      }
      break;
  }
  ctx.restore();
}

/* ===================== 小人绘制(敌人用) ===================== */
function drawShadow(x,y,w){ ctx.save();ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.ellipse(x,y+4,w*0.55,8,0,0,7);ctx.fill();ctx.restore(); }
function roundRect(x,y,w,h,r){ ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath(); }
function drawHumanoid(x,feetY,dir,color,dark,ent,flash,invuln,big=false){
  ctx.save(); ctx.translate(x,feetY); ctx.scale(dir,1);
  const s=big?1.35:1;
  const walk=Math.sin(ent.walkPhase||0)*((ent.state==='walk'||ent.kind)?6:0);
  const legH=26*s,bodyH=56*s,headR=13*s,bob=ent.onGround?0:-4;
  if(invuln)ctx.globalAlpha=0.65;
  ctx.strokeStyle=dark;ctx.lineWidth=8*s;ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-4*s,-legH);ctx.lineTo(-6*s+walk*0.6,0); ctx.moveTo(4*s,-legH);ctx.lineTo(6*s-walk*0.6,0);ctx.stroke();
  ctx.fillStyle=flash?'#fff':color; roundRect(-12*s,-(legH+bodyH)+bob,24*s,bodyH,7*s); ctx.fill();
  const atk=(ent.attackTimer||0)>0;
  ctx.strokeStyle=flash?'#fff':dark;ctx.lineWidth=7*s;ctx.beginPath();
  if(atk){ctx.moveTo(6*s,-(legH+bodyH*0.7));ctx.lineTo(26*s,-(legH+bodyH*0.55));}
  else{ctx.moveTo(8*s,-(legH+bodyH*0.7));ctx.lineTo(14*s,-(legH+bodyH*0.25)+walk*0.5);}
  ctx.moveTo(-8*s,-(legH+bodyH*0.7));ctx.lineTo(-12*s,-(legH+bodyH*0.25)-walk*0.5);ctx.stroke();
  if(atk){ctx.strokeStyle=flash?'#fff':'#dfe9ff';ctx.lineWidth=5*s;ctx.beginPath();ctx.moveTo(26*s,-(legH+bodyH*0.55));ctx.lineTo(50*s,-(legH+bodyH*0.55)-16*s);ctx.stroke();}
  ctx.fillStyle=flash?'#fff':'#f2cda0';ctx.beginPath();ctx.arc(0,-(legH+bodyH)-headR+bob,headR,0,7);ctx.fill();
  ctx.fillStyle=dark;ctx.beginPath();ctx.arc(0,-(legH+bodyH)-headR+bob,headR,Math.PI,0);ctx.fill();
  ctx.fillStyle='#222';ctx.fillRect(3*s,-(legH+bodyH)-headR+bob-2,3*s,3*s);
  ctx.restore();
}
/* ===================== 技能专属特效派发 ===================== */
function spawnSkillFX(p, sk){
  const x=p.x, y=p.y, dir=p.dir;
  shake=Math.max(shake, sk.type==='ult'?12:7);
  // 施放特效: 原版特效与身体同坐标系(脚底原点)同缩放, 逐帧时序/坐标由 skillfx v3 数据驱动。
  // proj 类的飞行外观由 Projectile 自绘 <fx>_proj; 仅当存在独立飞行层时才叠加施放层, 避免重复。
  const castClip=sk.fx && SKILLFX.ready && fxHasClip(sk.fx) && (sk.type!=='proj' || fxHasClip(sk.fx+'_proj'));
  if(castClip){
    const prof=SKILL_RUNTIME_PROFILE[sk.fx]?.effect;
    const scale=prof?.scale ?? SPR_SCALE;
    const aheadPx=prof?.ahead ?? 0, yo=prof?.yo ?? 0;
    // follow=true: 特效锚定施法者当前身位(突进/起跳跟随, 含 SKILL_MOVE 位移技); 范围/大招落在施放点。
    const follow=prof?.follow ?? (!!SKILL_MOVE[sk.fx] || !(sk.type==='aoe'||sk.type==='ult'));
    const durMs=fxClipInfo(sk.fx).dur;
    addEffect({type:'spr', clip:sk.fx, x:x+dir*aheadPx, y, sy:p.screenY(), dir, scale, yo, ahead:aheadPx, follow,
               max:Math.max(12,Math.round(durMs/1000*LOGIC_HZ)), alpha:1});
  }
  // 地面/范围技能补一道地面冲击波(矢量), 增强打击感
  if(sk.type==='aoe'||sk.type==='ult')
    addEffect({type:'quake',x:x+dir*(sk.ox||0),y,r:sk.radius||120,n:8,max:24,color:sk.color,color2:'#fff'});
}

/* ===================== 特效渲染 ===================== */
function drawEffects(){
  for(const e of effects){
    if(e.delay>0) continue;
    const p=e.t/e.max; ctx.save();
    if(e.type==='spr'){ // 客户端真实技能特效精灵(多图层, 原版逐帧时序/坐标)
      const a=p>0.9?(1-p)/0.1:1;
      let ex=e.x, ey=(e.sy!=null?e.sy:e.y)-(e.yo||0);
      if(e.follow && player && !player.dead){ ex=player.x+e.dir*(e.ahead||0); ey=player.screenY()-(e.yo||0); } // 跟随施法者身位(含突进/起跳)
      drawFXClipLayers(e.clip, e.t*(1000/LOGIC_HZ), ex, ey, e.scale, e.dir, (e.alpha||1)*a);
      ctx.restore(); continue; }
    if(e.type==='ring'){ const r=e.r0+(e.r1-e.r0)*p;
      ctx.globalAlpha=(1-p)*0.8; ctx.strokeStyle=e.color; ctx.lineWidth=8*(1-p)+2;
      ctx.beginPath(); ctx.ellipse(e.x,e.y-40,r,r*0.45,0,0,7); ctx.stroke();
      ctx.globalAlpha=(1-p)*0.25; ctx.fillStyle=e.color; ctx.beginPath(); ctx.ellipse(e.x,e.y-40,r,r*0.45,0,0,7); ctx.fill(); }
    else if(e.type==='slash'){ ctx.globalAlpha=(1-p)*0.85; ctx.strokeStyle=e.color; ctx.lineWidth=10*(1-p)+3;
      ctx.beginPath(); const cx=e.x,cy=e.y-50,R=e.reach; const start=e.dir>0?-1.2:Math.PI+1.2, end=start+e.dir*2.2*p;
      ctx.arc(cx,cy,R,start,end,e.dir<0); ctx.stroke(); }
    else if(e.type==='aura'){ const r=e.r0+(e.r1-e.r0)*p; ctx.globalAlpha=(1-p)*0.7; ctx.strokeStyle=e.color; ctx.lineWidth=5;
      ctx.beginPath(); ctx.ellipse(e.x,e.y,r,r*0.4,0,0,7); ctx.stroke(); }
    else if(e.type==='doorburst'){
      const a=1-p, r=e.r0+(e.r1-e.r0)*p;
      ctx.globalAlpha=a*0.8; ctx.strokeStyle=e.color; ctx.lineWidth=7*a+2;
      ctx.beginPath(); ctx.ellipse(e.x,e.y-58,r,r*0.75,0,0,7); ctx.stroke();
      ctx.globalAlpha=a*0.3; ctx.fillStyle=e.color; ctx.fillRect(e.x-9,e.y-164,18,154);
      for(let i=0;i<8;i++){ const yy=e.y-150+i*18, off=Math.sin(p*8+i)*18*a;
        ctx.globalAlpha=a*0.45; ctx.fillStyle=i%2?'#fff':e.color; ctx.fillRect(e.x-38+off,yy,76,3); }
    }
    else if(e.type==='dashtrail'){ ctx.fillStyle=e.color; for(let i=1;i<=4;i++){ ctx.globalAlpha=(1-p)*0.4/i; ctx.fillRect(e.x-e.dir*i*22-14,e.y-90,28,80); } }
    /* ── 新增技能特效 ── */
    else if(e.type==='arc'){ // 大斩击弧(多层)
      const cy=e.y-e.yo, sweep=e.dir*e.span*Math.min(1,p*1.7), s=e.dir>0?e.a0:Math.PI-e.a0;
      for(let L=0;L<3;L++){ ctx.globalAlpha=(1-p)*(0.9-L*0.24); ctx.strokeStyle=L===1?'#fff':e.color; ctx.lineWidth=(11-L*3)*(1-p*0.4);
        ctx.beginPath(); ctx.arc(e.x,cy,e.r-L*7,s,s+sweep,e.dir<0); ctx.stroke(); } }
    else if(e.type==='wave'){ // 向前飞行的剑气
      const fx=e.x+e.dir*p*e.dist, cy=e.y-e.yo, a=Math.sin(p*Math.PI);
      ctx.globalAlpha=a*0.9; ctx.strokeStyle=e.color; ctx.lineWidth=e.lw||7;
      ctx.beginPath(); ctx.arc(fx-e.dir*28,cy,48,e.dir>0?-0.95:Math.PI+0.95,e.dir>0?0.95:Math.PI-0.95,e.dir<0); ctx.stroke();
      ctx.globalAlpha=a*0.55; ctx.strokeStyle='#fff'; ctx.lineWidth=(e.lw||7)*0.4;
      ctx.beginPath(); ctx.arc(fx-e.dir*28,cy,48,e.dir>0?-0.7:Math.PI+0.7,e.dir>0?0.7:Math.PI-0.7,e.dir<0); ctx.stroke(); }
    else if(e.type==='pillar'){ // 升腾光柱
      const a=Math.sin(p*Math.PI), w=e.r*(0.5+a*0.5);
      const grd=ctx.createLinearGradient(e.x,e.y,e.x,e.y-e.h);
      grd.addColorStop(0,e.color); grd.addColorStop(0.7,e.color); grd.addColorStop(1,'rgba(255,255,255,0)');
      ctx.globalAlpha=a*0.8; ctx.fillStyle=grd; ctx.fillRect(e.x-w/2,e.y-e.h,w,e.h);
      ctx.globalAlpha=a; ctx.fillStyle='#fff'; ctx.fillRect(e.x-w*0.16,e.y-e.h,w*0.32,e.h); }
    else if(e.type==='hail'){ // 冰雹群下落
      for(let i=0;i<e.n;i++){ const ox=(i-(e.n-1)/2)*(e.spread/e.n)+Math.sin(i*2.3)*14, fall=p*1.2-i*0.05;
        if(fall<0||fall>1) continue; const yy=e.y-e.h+fall*e.h;
        ctx.globalAlpha=0.9; ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(e.x+ox,yy,e.sz,0,7); ctx.fill();
        ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(e.x+ox-2,yy-2,e.sz*0.4,0,7); ctx.fill();
        if(fall>0.9){ ctx.globalAlpha=0.5; ctx.strokeStyle=e.color; ctx.lineWidth=2; ctx.beginPath(); ctx.ellipse(e.x+ox,e.y,16,6,0,0,7); ctx.stroke(); } } }
    else if(e.type==='nova'){ // 爆发环 + 放射
      const a=(1-p), R=e.r*Math.min(1,p*1.3), cy=e.y-e.yo;
      ctx.globalAlpha=a*0.85; ctx.strokeStyle=e.color; ctx.lineWidth=6*a+2;
      ctx.beginPath(); ctx.ellipse(e.x,cy,R,R*0.55,0,0,7); ctx.stroke();
      ctx.globalAlpha=a*0.22; ctx.fillStyle=e.color; ctx.beginPath(); ctx.ellipse(e.x,cy,R,R*0.55,0,0,7); ctx.fill();
      ctx.globalAlpha=a*0.7; ctx.strokeStyle=e.color2||'#fff'; ctx.lineWidth=2;
      for(let i=0;i<e.n;i++){ const ang=i*(Math.PI*2/e.n)+(e.rot||0)*p;
        ctx.beginPath(); ctx.moveTo(e.x+Math.cos(ang)*R*0.4,cy+Math.sin(ang)*R*0.4*0.55); ctx.lineTo(e.x+Math.cos(ang)*R,cy+Math.sin(ang)*R*0.55); ctx.stroke(); } }
    else if(e.type==='quake'){ // 地面冲击波 + 地裂
      const a=(1-p), R=e.r*Math.min(1,p*1.2);
      ctx.globalAlpha=a*0.5; ctx.fillStyle=e.color; ctx.beginPath(); ctx.ellipse(e.x,e.y,R,R*0.32,0,0,7); ctx.fill();
      ctx.globalAlpha=a*0.9; ctx.strokeStyle=e.color2||'#fff'; ctx.lineWidth=4*a+1;
      ctx.beginPath(); ctx.ellipse(e.x,e.y,R,R*0.32,0,0,7); ctx.stroke();
      ctx.globalAlpha=a*0.6;
      for(let i=0;i<e.n;i++){ const ang=i*(Math.PI*2/e.n); ctx.beginPath(); ctx.moveTo(e.x,e.y); ctx.lineTo(e.x+Math.cos(ang)*R,e.y+Math.sin(ang)*R*0.32); ctx.stroke(); } }
    else if(e.type==='spin'){ // 旋转刃
      const cy=e.y-e.yo;
      for(let i=0;i<e.n;i++){ const ang=p*Math.PI*e.turns+i*(Math.PI*2/e.n), R=e.r*(0.4+Math.sin(p*Math.PI)*0.6);
        ctx.globalAlpha=(1-p)*0.85; ctx.strokeStyle=i%2?'#fff':e.color; ctx.lineWidth=5;
        ctx.beginPath(); ctx.moveTo(e.x+Math.cos(ang)*R*0.3,cy+Math.sin(ang)*R*0.3*0.6); ctx.lineTo(e.x+Math.cos(ang)*R,cy+Math.sin(ang)*R*0.6); ctx.stroke(); } }
    else if(e.type==='rune'){ // 地面法阵(淡入淡出 + 旋转)
      const a=p<0.18?p/0.18:p>0.82?(1-p)/0.18:1, R=e.r, rot=e.t*0.04;
      ctx.globalAlpha=a*0.85; ctx.strokeStyle=e.color; ctx.lineWidth=2;
      ctx.beginPath(); ctx.ellipse(e.x,e.y,R,R*0.4,0,0,7); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(e.x,e.y,R*0.62,R*0.62*0.4,0,0,7); ctx.stroke();
      for(let i=0;i<8;i++){ const ang=i*(Math.PI/4)+rot;
        ctx.beginPath(); ctx.moveTo(e.x+Math.cos(ang)*R*0.62,e.y+Math.sin(ang)*R*0.62*0.4); ctx.lineTo(e.x+Math.cos(ang)*R,e.y+Math.sin(ang)*R*0.4); ctx.stroke(); }
      ctx.globalAlpha=a*0.13; ctx.fillStyle=e.color; ctx.beginPath(); ctx.ellipse(e.x,e.y,R,R*0.4,0,0,7); ctx.fill(); }
    else if(e.type==='beams'){ // 放射光束爆发
      const a=Math.sin(Math.min(1,p)*Math.PI), cy=e.y-e.yo, R=e.r*Math.min(1,p*1.4);
      for(let i=0;i<e.n;i++){ const ang=i*(Math.PI*2/e.n)+(e.rot||0)*p;
        ctx.globalAlpha=a*0.8; ctx.strokeStyle=i%2?(e.color2||'#fff'):e.color; ctx.lineWidth=4;
        ctx.beginPath(); ctx.moveTo(e.x,cy); ctx.lineTo(e.x+Math.cos(ang)*R,cy+Math.sin(ang)*R*0.55); ctx.stroke(); }
      ctx.globalAlpha=a*0.35; ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(e.x,cy,e.r*0.22*Math.min(1,p*1.4),0,7); ctx.fill(); }
    else if(e.type==='phantom'){ // 残影分身
      for(let i=1;i<=e.n;i++){ ctx.globalAlpha=(1-p)*0.5/i; ctx.fillStyle=e.color; ctx.fillRect(e.x+e.dir*i*e.gap-11,e.y-95,22,72); } }
    else if(e.type==='flame'){ // 火焰簇
      for(let i=0;i<e.n;i++){ const ox=(i-(e.n-1)/2)*(e.spread/e.n), ph=performance.now()/70+i, h=e.h*(0.6+0.4*Math.abs(Math.sin(ph)))*(1-p*0.5);
        ctx.globalAlpha=(1-p)*0.8; ctx.fillStyle=i%2?(e.color2||'#ff5500'):e.color;
        ctx.beginPath(); ctx.moveTo(e.x+ox-7,e.y); ctx.quadraticCurveTo(e.x+ox,e.y-h*0.6,e.x+ox,e.y-h); ctx.quadraticCurveTo(e.x+ox,e.y-h*0.6,e.x+ox+7,e.y); ctx.closePath(); ctx.fill(); } }
    ctx.restore();
  }
}

function drawBackground(){
  const dun=currentDungeonDef();
  const t=dun.tint;
  const g=ctx.createLinearGradient(0,0,0,GROUND_TOP); g.addColorStop(0,t[0]);g.addColorStop(1,t[1]);
  ctx.fillStyle=g;ctx.fillRect(0,0,WORLD_W,GROUND_TOP);
  // —— 视差远景层(随相机缓慢平移, 营造纵深) —— 上下文已 -camX, 故按屏幕坐标铺再 +camX 还原
  const plx=(pf,step,fn)=>{ const off=((camX*pf)%step+step)%step; for(let s=-step;s<=W+step;s+=step) fn(s-off+camX); };
  ctx.fillStyle='rgba(0,0,0,0.24)';                                   // 最远: 大拱门剪影
  plx(0.18,300,(cx)=>{ ctx.beginPath(); ctx.moveTo(cx,GROUND_TOP); ctx.lineTo(cx,80);
    ctx.quadraticCurveTo(cx+105,18,cx+210,80); ctx.lineTo(cx+210,GROUND_TOP); ctx.closePath(); ctx.fill(); });
  ctx.fillStyle='rgba(0,0,0,0.16)';                                   // 次远: 廊柱
  plx(0.40,160,(cx)=>{ ctx.fillRect(cx,96,28,GROUND_TOP-96); ctx.fillRect(cx-6,90,40,8); });
  // 远景砖柱
  ctx.fillStyle='rgba(0,0,0,.18)';
  for(let x=0;x<WORLD_W;x+=120) ctx.fillRect(x,40,40,GROUND_TOP-40);
  ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=1;
  for(let y=20;y<GROUND_TOP;y+=28){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(WORLD_W,y);ctx.stroke();}
  for(let x=0;x<WORLD_W;x+=56){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,GROUND_TOP);ctx.stroke();}
  // 沿世界分布的火把
  for(let fx=160; fx<WORLD_W; fx+=320){ const fy=90+Math.sin(performance.now()/200+fx)*2;
    ctx.fillStyle='#5b3a1a';ctx.fillRect(fx-3,fy,6,40);
    const grd=ctx.createRadialGradient(fx,fy,2,fx,fy,28);
    grd.addColorStop(0,'rgba(255,180,60,.9)');grd.addColorStop(1,'rgba(255,120,0,0)');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(fx,fy,28,0,7);ctx.fill(); }
  const floor=dun.floor||['#4a3f33','#2b2520'];
  const gg=ctx.createLinearGradient(0,GROUND_TOP,0,H); gg.addColorStop(0,floor[0]);gg.addColorStop(1,floor[1]);
  ctx.fillStyle=gg;ctx.fillRect(0,GROUND_TOP,WORLD_W,H-GROUND_TOP);
  ctx.strokeStyle='rgba(0,0,0,.3)';
  for(let i=0;i<8;i++){const yy=GROUND_TOP+i*(H-GROUND_TOP)/8;ctx.beginPath();ctx.moveTo(0,yy);ctx.lineTo(WORLD_W,yy);ctx.stroke();}
  // 左侧封闭石墙(来路已封)
  ctx.fillStyle='#15121b'; ctx.fillRect(-60,0,60,GROUND_BOT+30);
  ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillRect(0,0,10,GROUND_BOT+30);
}

function wrapText(txt,cx,y,maxw,lh){ const chars=txt.split(''); let line='',yy=y;

  ctx.fillText(line,cx,yy); }

/* ===================== 游戏流程 ===================== */
let player, enemies=[], dungeon=1, dungeonId=0, mapIndex=0, room=1, gameState='menu';
let door=null, transition=0, bossIntro=0, bossGate=false;
const ROOMS_PER_DUNGEON=6; // 1~5 普通房, 6 = Boss 房
function resetPools(){ particles.length=0;floatTexts.length=0;effects.length=0;projectiles.length=0;enemyProjectiles.length=0;pickups.length=0;hazards.length=0;lootFly.length=0; }
function startGame(clsKey){
  player=new Player(clsKey);
  enemies=[]; resetPools();
  dungeonId=0; dungeon=1; room=1; score=0; shake=0; hitstop=0; combo={count:0,dmg:0,timer:0};
  door=null; transition=0; mapIndex=Math.min(Save.data.unlocked||0,DUNGEONS.length-1);
  gameState='mapsel'; Audio2.ensure(); Audio2.stopBgm();
}
function beginDungeon(id){
  dungeonId=clamp(id,0,DUNGEONS.length-1); dungeon=dungeonId+1; room=1; clearInfo=null;
  enemies=[]; resetPools(); door=null; transition=0; bossIntro=0; bossGate=false; clearPending=false; shopPending=false;
  gameState='play'; Audio2.ensure(); Audio2.startBgm(); enterRoom();
  player.x=80; player.y=(GROUND_TOP+GROUND_BOT)/2; updateCam();
}
/* ===================== 运行存档(已穿装备/背包/快捷栏/金币/进度) ===================== */
function serializeRun(){
  if(!player||player.dead) return;
  const p=player;
  Save.data.run={ clsKey:p.clsKey, level:p.level, exp:p.exp, expNext:p.expNext, gold:p.gold,
    crit:p._crit, shopAtk:p.shopAtk, buy:p.buy, maxhp:p.maxhp, maxmp:p.maxmp, hp:p.hp, mp:p.mp,
    equipped:p.equipped, inventory:p.inventory, hotbar:p.hotbar, dungeonId, dungeon:dungeonId+1, room,
    skillOrder:p.skills.slice(1).map(s=>s.name) };   // 技能槽自定义顺序(槽1..6)
  Save.save();
}
function clearRun(){ if(Save.data.run){ Save.data.run=null; Save.save(); } }
function continueGame(){
  const r=Save.data.run; if(!r){ gameState='select'; return; }
  player=new Player(r.clsKey); enemies=[]; resetPools();
  Object.assign(player,{ level:r.level, exp:r.exp, expNext:r.expNext, gold:r.gold,
    _crit:r.crit, shopAtk:r.shopAtk, buy:r.buy||{atk:0,hp:0,mp:0,crit:0},
    maxhp:r.maxhp, maxmp:r.maxmp, hp:r.hp, mp:r.mp,
    equipped:r.equipped||{weapon:null,head:null,chest:null,legs:null,shoes:null},
    inventory:r.inventory||[], hotbar:r.hotbar||new Array(6).fill(null) });
  if(r.skillOrder){ const head=player.skills[0], rest=player.skills.slice(1);   // 恢复技能槽自定义顺序
    const ordered=r.skillOrder.map(nm=>rest.find(s=>s.name===nm)).filter(Boolean);
    rest.forEach(s=>{ if(!ordered.includes(s)) ordered.push(s); });
    player.skills=[head].concat(ordered); rebindSkillKeys(); }
  dungeonId = r.dungeonId!=null ? r.dungeonId : clamp((r.dungeon||1)-1,0,DUNGEONS.length-1);
  dungeon=dungeonId+1; room=r.room||1; score=0; shake=0; hitstop=0; combo={count:0,dmg:0,timer:0};
  door=null; transition=0; bossIntro=0; bossGate=false;
  gameState='play'; Audio2.ensure(); Audio2.startBgm(); enterRoom();
  dunStats.gold0=player.gold;
}
function difficulty(){ return currentDungeonDef().recommendedLv + room + dungeonId*2; } // 地图推荐等级 + 房间推进
function enterRoom(){
  enemies=[]; resetPools();
  if(room===1) dunStats={t:0,kills:0,gold0:player?player.gold:0}; // 新一图开始, 重置统计
  const diff=difficulty();
  const scale=1+(diff-1)*0.1;
  const dun=currentDungeonDef();
  const isBoss=room===currentRooms();
  // 门常驻于世界右端, 进房即关闭, 清场后才激活
  door={x:WORLD_W-46, y:(GROUND_TOP+GROUND_BOT)/2, boss:isBoss, open:false, grace:0};
  if(isBoss){
    enemies.push(new Enemy(WORLD_W-160,(GROUND_TOP+GROUND_BOT)/2,dun.boss,1+dungeonId*0.5));
    bossIntro=120; bossGate=true; Audio2.startBossBgm();
    showBanner('⚠ '+dun.name+' 首领 ⚠','#ff5a5a',true);
    showStageTitle(dun.name+' · 首领房','ROOM '+room+' / '+currentRooms(),'#ff5a5a',true);
  } else {
    bossIntro=0; bossGate=false; if(Audio2.bossBgm) Audio2.startBgm('normal');
    const n=2+Math.min(diff,7);
    for(let i=0;i<n;i++){
      let kind=pickMonsterKind(dun);
      enemies.push(new Enemy(rand(WORLD_W*0.4,WORLD_W-120),rand(GROUND_TOP+10,GROUND_BOT-10),kind,scale));
    }
    // 精英怪: 普通房有概率出现一只(更强更大发光, 必掉装备)
    if(diff>=2 && enemies.length && Math.random()<0.24){
      const e=enemies[Math.floor(Math.random()*enemies.length)];
      e.elite=true; e.eliteCol='#ffcf4d';
      e.maxhp=Math.round(e.maxhp*2.4); e.hp=e.maxhp;
      e.atkScale*=1.45; e.scale*=1.3; e.aggroRange+=80;
    }
    showBanner(dun.name+' · 第'+room+'/'+currentRooms()+'房','#cfd8e6');
    showStageTitle(dun.name,'ROOM '+room+' / '+currentRooms(),dun.tint[1],false);
  }
  serializeRun(); // 每进一房存档
}
function openDoor(){
  // 房间清空 → 激活门(闪烁), 走进去才切下一房
  door.open=true; door.grace=36;
  Audio2.sfx('select');
  addEffect({type:'doorburst',x:door.x,y:door.y,color:door.boss?'#ff8c42':'#ffd24d',max:36,r0:24,r1:120});
  shake=Math.max(shake,door.boss?8:4);
  spawnText(door.x-90,GROUND_TOP-6, door.boss?'通关之门 →':'前方门已开 →','#ffcf4d');
}
function computeClear(){
  const hpR=player.hp/player.maxhp;
  const par=currentRooms()*1500;                 // 目标 ~25 秒/房
  const timeR=clamp(par/Math.max(dunStats.t,1),0,2);
  const sc=hpR*0.9+timeR*0.7;
  const grade= sc>=1.45?'S': sc>=1.15?'A': sc>=0.85?'B':'C';
  return {dungeon:dungeonId+1, name:currentDungeonDef().name, sec:Math.round(dunStats.t/60), kills:dunStats.kills,
          gold:Math.max(0,player.gold-dunStats.gold0), grade, lv:player.level, hp:Math.round(hpR*100)};
}
function nextRoom(){
  if(room>=currentRooms()){
    clearInfo=computeClear();             // 结算(基于刚通关的本图)
    unlockNextDungeon(dungeonId);
    clearRun();
    generateShopItems();
    bossGate=false;
    clearPending=true;                    // transition 结束后先进结算界面
  } else {
    room++;
    enterRoom();
    player.x=80; player.y=(GROUND_TOP+GROUND_BOT)/2;
    updateCam();
  }
}
function dropLoot(e){
  if(e.noLoot) return;
  const c=e.conf;
  pickups.push(new Pickup(e.x,e.y,'gold',Math.round(rand(c.gold[0],c.gold[1]))));
  if(Math.random()<0.12) pickups.push(new Pickup(e.x+rand(-15,15),e.y,'hp',Math.round(rand(15,30))));
  if(Math.random()<0.10) pickups.push(new Pickup(e.x+rand(-15,15),e.y,'mp',Math.round(rand(12,24))));
  if(e.kind==='boss'){
    // Boss 必掉 2~4 件装备(随稀有度)
    for(let i=0;i<5;i++) pickups.push(new Pickup(e.x+rand(-40,40),e.y,'gold',Math.round(rand(8,16))));
    const dropN=2+Math.floor(Math.random()*3);
    for(let i=0;i<dropN;i++) pickups.push(new Pickup(e.x+rand(-70,70),e.y,'equip',genEquip(difficulty()),{bossDrop:true}));
    // 并有机会掉消耗品
    if(Math.random()<0.6) pickups.push(new Pickup(e.x+rand(-30,30),e.y,'consumable','hp_m'));
    if(Math.random()<0.4) pickups.push(new Pickup(e.x+rand(-30,30),e.y,'consumable','mp_m'));
  } else if(e.elite){
    // 精英怪: 必掉 1 件装备 + 额外金币, 较高概率掉消耗品
    for(let i=0;i<3;i++) pickups.push(new Pickup(e.x+rand(-30,30),e.y,'gold',Math.round(rand(6,12))));
    pickups.push(new Pickup(e.x+rand(-30,30),e.y,'equip',genEquip(difficulty()+4)));
    if(Math.random()<0.5){ const types=['hp_m','mp_s','atk_p']; pickups.push(new Pickup(e.x,e.y,'consumable',types[Math.floor(Math.random()*types.length)])); }
  } else {
    // 普通怪 5% 概率掉装备、10% 掉消耗品
    if(Math.random()<0.05) pickups.push(new Pickup(e.x,e.y,'equip',genEquip(difficulty())));
    else if(Math.random()<0.10){
      const types=['hp_s','mp_s','hp_s','atk_p'];
      pickups.push(new Pickup(e.x,e.y,'consumable',types[Math.floor(Math.random()*types.length)]));
    }
  }
}

function update(){
  // 菜单类状态
  if(gameState==='menu'){
    const menu=getMenu(), N=menu.length; menuIndex=clamp(menuIndex,0,N-1);
    if(pressed('arrowup'))menuIndex=(menuIndex+N-1)%N;
    if(pressed('arrowdown'))menuIndex=(menuIndex+1)%N;
    if(pressed('enter')||pressed(' ')){ Audio2.sfx('select');
      const a=menu[menuIndex].act;
      if(a==='continue') continueGame();
      else if(a==='start') gameState='select';
      else if(a==='help') gameState='help';
      else Audio2.toggleMute(); }
    return;
  }
  if(gameState==='help'){ if(pressed('enter')||pressed('escape')||pressed(' ')) gameState='menu'; return; }
  if(gameState==='select'){
    const N=CLASS_KEYS.length;
    if(pressed('arrowleft')){selIndex=(selIndex+N-1)%N;Audio2.sfx('ui');}
    if(pressed('arrowright')){selIndex=(selIndex+1)%N;Audio2.sfx('ui');}
    if(pressed('escape')){gameState='menu';return;}
    for(let i=1;i<=Math.min(9,N);i++) if(pressed(''+i)){selIndex=i-1;startGame(CLASS_KEYS[selIndex]);return;}
    if(pressed('enter')||pressed(' ')){startGame(CLASS_KEYS[selIndex]);return;}
    return;
  }
  if(gameState==='mapsel'){
    const N=DUNGEONS.length; mapIndex=clamp(mapIndex,0,N-1);
    if(pressed('arrowup')){mapIndex=(mapIndex+N-1)%N;Audio2.sfx('ui');}
    if(pressed('arrowdown')){mapIndex=(mapIndex+1)%N;Audio2.sfx('ui');}
    if(pressed('s')){ generateShopItems(); gameState='shop'; Audio2.sfx('ui'); return; }
    if(pressed('escape')){gameState='select';return;}
    for(let i=1;i<=Math.min(9,N);i++) if(pressed(''+i)){mapIndex=i-1;}
    if((pressed('enter')||pressed(' ')) && mapIndex<=(Save.data.unlocked||0)){ beginDungeon(mapIndex); return; }
    return;
  }
  if(gameState==='shop'){
    if(shopSellMode){
      if(pressed('arrowup'))   shopCursor=Math.max(0,shopCursor-1);
      if(pressed('arrowdown')) shopCursor=Math.min(Math.max(0,player.inventory.length-1),shopCursor+1);
      if(pressed('enter')){
        const it=player.inventory[shopCursor];
        if(it){ const sp=sellPrice(it); player.gold+=sp; player.inventory.splice(shopCursor,1);
          shopCursor=clamp(shopCursor,0,Math.max(0,player.inventory.length-1)); Audio2.sfx('coin'); }
      }
      if(pressed('s')||pressed('escape')){ shopSellMode=false; shopCursor=0; }
      return;
    }
    if(pressed('arrowleft') ){ shopTab=(shopTab+2)%3; shopCursor=0; Audio2.sfx('ui'); }
    if(pressed('arrowright')){ shopTab=(shopTab+1)%3; shopCursor=0; Audio2.sfx('ui'); }
    const tabLen=[shopItems.length, Object.keys(CONSUMABLE_PRICES).length, SHOP.length];
    if(pressed('arrowup'))   shopCursor=Math.max(0,shopCursor-1);
    if(pressed('arrowdown')) shopCursor=Math.min(Math.max(0,tabLen[shopTab]-1),shopCursor+1);
    if(pressed('s')){ shopSellMode=true; shopCursor=0; Audio2.sfx('ui'); }
    if(pressed('enter')){
      if(shopTab===0){
        const eq=shopItems[shopCursor];
        if(eq&&player.gold>=eq.price){ player.gold-=eq.price; player.addItem(eq);
          shopItems.splice(shopCursor,1); shopCursor=clamp(shopCursor,0,Math.max(0,shopItems.length-1)); Audio2.sfx('coin');
        } else Audio2.sfx('ui');
      } else if(shopTab===1){
        const type=Object.keys(CONSUMABLE_PRICES)[shopCursor], price=CONSUMABLE_PRICES[type];
        if(player.gold>=price){ player.gold-=price; player.addItem({kind:'consumable',type}); Audio2.sfx('coin'); }
        else Audio2.sfx('ui');
      } else {
        const it=SHOP[shopCursor];
        if(it){ const cost=shopCost(it); if(player.gold>=cost){ player.gold-=cost; it.apply(); Audio2.sfx('coin'); } else Audio2.sfx('ui'); }
      }
    }
    if(pressed('escape')||pressed(' ')){
      if(clearInfo){ mapIndex=dungeonId; gameState='mapsel'; Audio2.stopBgm(); }
      else { gameState='play'; Audio2.startBgm(); enterRoom(); player.x=80; player.y=(GROUND_TOP+GROUND_BOT)/2; updateCam(); }
    }
    return;
  }
  if(gameState==='pause'){ if(pressed('enter')) gameState='play'; return; }
  if(gameState==='clear'){
    if(pressed('s')){ Audio2.sfx('select'); gameState='shop'; return; }
    if(pressed('enter')||pressed(' ')){ Audio2.sfx('select'); mapIndex=dungeonId; gameState='mapsel'; }
    return;
  }
  if(gameState==='transition'){
    transition--;
    if(transition===20) nextRoom();
    if(transition<=0){
      if(clearPending){ gameState='clear'; clearPending=false; Audio2.stopBgm(); Audio2.sfx('levelup'); }
      else if(shopPending){ gameState='shop'; shopPending=false; Audio2.stopBgm(); }
      else gameState='play';
    }
    return;
  }
  if(gameState!=='play') return;

  // 背包导航(开着时消耗方向键/Enter,游戏继续运行)
  if(player.invOpen){
    const len=player.inventory.length;
    if(pressed('arrowleft')  && player.invCursor%INV_COLS>0)          player.invCursor--;
    if(pressed('arrowright') && player.invCursor%INV_COLS<INV_COLS-1) player.invCursor=Math.min(len-1,player.invCursor+1);
    if(pressed('arrowup')    && player.invCursor>=INV_COLS)            player.invCursor-=INV_COLS;
    if(pressed('arrowdown'))  player.invCursor=Math.min(len-1,player.invCursor+INV_COLS);
    if(pressed('enter')){
      const it=player.inventory[player.invCursor];
      if(it&&it.kind==='equip') player.equipItem(it);
    }
    // 方向键已被消耗,阻止角色移动
    ['arrowleft','arrowright','arrowup','arrowdown'].forEach(k=>keys[k]=false);
  }
  // 消耗品快捷栏 1~6
  if(!player.invOpen){
    for(let i=0;i<6;i++) if(pressed(''+(i+1))) player.useHotbar(i);
  }

  if(hitstop>0){ hitstop--; return; } // 命中冻帧
  dunStats.t++;                        // 本图用时(帧)

  player.update();
  updateCam();
  for(const e of enemies)e.update();
  for(const p of projectiles)p.update();
  for(const p of enemyProjectiles)p.update();
  for(const h of hazards)h.update();
  for(const pk of pickups)pk.update();

  for(const e of enemies) if(e.dead&&!e._counted){ e._counted=true; dunStats.kills++; score+=Math.round(e.conf.exp*1.5*(e.elite?2:1)); player.gainExp(e.conf.exp*(e.elite?2:1)); dropLoot(e); Audio2.sfx('die'); spawnHit(e.x,e.screenY()-40,'#ffcf4d',12); }
  enemies=enemies.filter(e=>!(e.dead&&(e._t=(e._t||0)+1)>30));
  for(let i=projectiles.length-1;i>=0;i--) if(projectiles[i].life<=0)projectiles.splice(i,1);
  for(let i=enemyProjectiles.length-1;i>=0;i--) if(enemyProjectiles[i].life<=0)enemyProjectiles.splice(i,1);
  for(let i=hazards.length-1;i>=0;i--) if(hazards[i].life<=0)hazards.splice(i,1);
  for(let i=pickups.length-1;i>=0;i--) if(pickups[i].life<=0)pickups.splice(i,1);

  if(enemies.length===0 && door && !door.open) openDoor();    // 清空 → 激活门(闪烁)
  if(door && door.open){
    if(door.grace>0) door.grace--;                            // 宽限期: 吸取掉落、看清提示
    else if(!player.dead && player.x>door.x-30 && Math.abs(player.y-door.y)<110){
      gameState='transition'; transition=40; Audio2.sfx('ui'); // 走进门 → 切下一房
    }
  }
  if(player.dead){ gameState='dead'; Audio2.stopBgm(); clearRun();
    if(score>Save.data.high){ Save.data.high=score; Save.save(); } }

  if(combo.timer>0){ combo.timer--; if(combo.timer===0)combo={count:0,dmg:0,timer:0}; }
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.25;p.life--;}
  for(let i=particles.length-1;i>=0;i--)if(particles[i].life<=0)particles.splice(i,1);
  for(const t of floatTexts){t.y-=0.8;t.life--;}
  for(let i=floatTexts.length-1;i>=0;i--)if(floatTexts[i].life<=0)floatTexts.splice(i,1);
  for(const l of lootFly) l.life--;
  for(let i=lootFly.length-1;i>=0;i--)if(lootFly[i].life<=0)lootFly.splice(i,1);
  for(const e of effects){ if(e.delay>0){e.delay--;} else e.t++; }
  for(let i=effects.length-1;i>=0;i--)if(effects[i].t>=effects[i].max)effects.splice(i,1);
  if(shake>0){shake*=0.85;if(shake<0.5)shake=0;}
}

function drawDoor(){
  const cx=door.x, dw=64, dh=150, bot=GROUND_BOT+6, top=bot-dh;
  const col=door.boss?'#ff8c42':'#ffd24d';
  ctx.save();
  // 石门框 + 拱顶石
  ctx.fillStyle='#3a3340'; ctx.fillRect(cx-dw/2-10, top-14, dw+20, dh+14);
  ctx.fillStyle='#46404e'; ctx.fillRect(cx-dw/2-10, top-14, dw+20, 14);
  ctx.fillStyle='#2a2530'; ctx.fillRect(cx-dw/2, top, dw, dh);
  if(door.open){
    const blink=0.55+0.45*Math.sin(performance.now()/120);
    const grd=ctx.createLinearGradient(0,top,0,bot);
    grd.addColorStop(0,'rgba(0,0,0,0)'); grd.addColorStop(0.5,col); grd.addColorStop(1,'rgba(255,255,255,.9)');
    ctx.globalAlpha=blink; ctx.fillStyle=grd; ctx.fillRect(cx-dw/2+6, top+6, dw-12, dh-6);
    ctx.globalAlpha=0.3*blink; ctx.fillStyle=col; ctx.fillRect(cx-dw/2-14, top-18, dw+28, dh+24); // 外发光
    ctx.globalAlpha=blink; ctx.fillStyle='#fff'; ctx.font='bold 30px sans-serif'; ctx.textAlign='center';
    ctx.fillText('▶', cx, (top+bot)/2+10);
  } else {
    // 关闭: 铁门 + 中缝 + 铆钉
    ctx.fillStyle='#1c1822'; ctx.fillRect(cx-dw/2+6, top+6, dw-12, dh-6);
    ctx.strokeStyle='#4a4350'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cx,top+8); ctx.lineTo(cx,bot); ctx.stroke();
    ctx.fillStyle='#3a3340';
    for(let yy=top+22; yy<bot-10; yy+=30){ ctx.beginPath();ctx.arc(cx-dw/4,yy,3,0,7);ctx.fill(); ctx.beginPath();ctx.arc(cx+dw/4,yy,3,0,7);ctx.fill(); }
  }
  ctx.textAlign='left'; ctx.restore();
}
function render(){
  if(gameState==='menu'){ drawMenu(); return; }
  if(gameState==='help'){ drawHelp(); return; }
  if(gameState==='select'){ drawSelect(); return; }
  if(gameState==='mapsel'){ drawMapSelect(); return; }
  if(gameState==='shop'){ drawShop(); return; }
  if(gameState==='clear'){ drawClear(); return; }
  ctx.save();
  const sx=shake>0?rand(-shake,shake):0, sy=shake>0?rand(-shake,shake):0;
  ctx.translate(-camX+sx, sy);                 // 摄像机 + 震动
  drawBackground();
  if(door) drawDoor();
  for(const h of hazards)h.draw();
  for(const pk of pickups)pk.draw();
  const ents=[player,...enemies].sort((a,b)=>a.y-b.y);
  for(const e of ents){ if(e.dead&&e._t>2){ctx.save();ctx.globalAlpha=clamp(1-(e._t/30),0,1);e.draw();ctx.restore();} else e.draw(); }
  for(const p of projectiles)p.draw();
  for(const p of enemyProjectiles)p.draw();
  drawEffects();
  for(const p of particles){ctx.globalAlpha=p.life/p.max;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();}
  ctx.globalAlpha=1;ctx.textAlign='center';
  for(const t of floatTexts){ ctx.globalAlpha=clamp(t.life/42,0,1); ctx.font='bold '+(t.big?24:18)+'px sans-serif';
    ctx.fillStyle='#000';ctx.fillText(t.txt,t.x+1,t.y+1); ctx.fillStyle=t.color;ctx.fillText(t.txt,t.x,t.y); }
  ctx.globalAlpha=1;ctx.textAlign='left';
  ctx.restore();
  if(gameState==='transition') drawTransitionCard();
  drawHud();
  if(player && player.invOpen) drawInventoryPanel();
  drawLootFly();
  drawStageTitle();
  if(banner){
    ctx.save(); ctx.globalAlpha=clamp(banner.life/40,0,1); ctx.textAlign='center';
    ctx.font='bold '+(banner.big?30:20)+'px sans-serif';
    ctx.fillStyle='#000'; ctx.fillText(banner.text,W/2+2,132);
    ctx.fillStyle=banner.color; ctx.fillText(banner.text,W/2,130);
    ctx.restore(); ctx.textAlign='left';
    if(gameState==='play'){ banner.life--; if(banner.life<=0)banner=null; }
  }
  if(gameState==='pause') overlay('暂 停','#8ab4ff',['按 P 继续','按 0 返回主菜单']);
  if(gameState==='dead') overlay('你 倒 下 了','#ff5a5a',['倒在第 '+dungeon+' 图 第 '+room+' 房 · Lv.'+player.level,'最终分数 '+score+'   历史最高 '+Save.data.high,'按 0 返回主菜单']);
}
// 固定步长累加器: 逻辑固定 60 tick/秒, 与显示器刷新率(60/120/144Hz)解耦, 避免高刷屏"加速"
const LOGIC_HZ=60, LOGIC_STEP=1000/LOGIC_HZ, MAX_CATCHUP=5;
let _lastFrame=performance.now(), _acc=0;
function loop(now){
  if(now===undefined) now=performance.now();
  let dt=now-_lastFrame; _lastFrame=now;
  if(dt>250) dt=250;              // 切后台/卡顿后不做死亡螺旋补偿
  _acc+=dt;
  let n=0;
  while(_acc>=LOGIC_STEP && n<MAX_CATCHUP){ update(); _acc-=LOGIC_STEP; n++; }
  if(n===MAX_CATCHUP) _acc=0;     // 追不上就丢弃积压, 保持实时
  render();
  requestAnimationFrame(loop);
}

});

// 调试: ?shot=blade&st=run 自动开局便于无头截图(正式使用无影响)
(function(){const q=new URLSearchParams(location.search);
  if(q.has('cont')){ const g=()=>{ if(!SPR.ready) return setTimeout(g,50); continueGame(); }; g(); return; }
  if(q.get('state')==='mapsel'){ const g=()=>{ if(!SPR.ready) return setTimeout(g,50); startGame(q.get('shot')||'blade'); gameState='mapsel'; }; g(); return; }
  if(!q.has('shot'))return;
  const cls=q.get('shot')||'blade', st=q.get('st')||'idle';
  const go=()=>{ if(!SPR.ready) return setTimeout(go,50);
    startGame(cls); beginDungeon(parseInt(q.get('map')||'0',10)||0); player.x=120; updateCam();
    if(q.get('mon')){ // 调试: 一字排开所有怪物种类
      enemies.length=0; const kinds=['gob','orc','archer','charger','bomber','boss'];
      kinds.forEach((kk,i)=>{ const e=new Enemy(260+i*120,(GROUND_TOP+GROUND_BOT)/2,kk,1); e.aggro=false; e.dir=-1;
        if(q.get('elite')&&i===0){ e.elite=true; e.eliteCol='#ffcf4d'; e.scale*=1.3; } enemies.push(e); });
      door=null;
    }
    if(q.get('lv')){ player.level=parseInt(q.get('lv'),10)||1; }
    if(st==='walk'||st==='run'){ keys['arrowright']=true; if(st==='run') player.running=1; }
    if(st==='attack'){ const a=()=>{ if(player&&!player.dead){ keys['x']=true; setTimeout(()=>keys['x']=false,30);} setTimeout(a,260); }; a(); }
    if(q.get('sk')){ player.level=Math.max(player.level,6); const sk=q.get('sk'); // 反复释放某技能便于截图
      const c=()=>{ if(player&&!player.dead){ player.mp=player.maxmp; for(const s of player.skills)s._cd=0; keys[sk]=true; setTimeout(()=>keys[sk]=false,40);} setTimeout(c,500); }; c(); }
    if(q.get('clear')){ clearInfo={dungeon:1,name:currentDungeonDef().name,sec:142,kills:27,gold:386,grade:q.get('clear'),lv:5,hp:73}; gameState='clear'; }
  }; go();
})();
</script>
